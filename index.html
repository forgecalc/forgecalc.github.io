<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>전투력 · 대장간 계산기</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f232c; --border:#2a2f3a;
    --text:#e8ecf1; --muted:#9aa3b2; --accent:#4cc2ff; --good:#6ee7b7; --bad:#f87171; --warn:#fbbf24;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
  .wrap{max-width:640px;margin:0 auto;padding:12px 10px 120px}
  h1{font-size:20px;margin:6px 4px 4px}
  details{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin:10px 0;overflow:hidden}
  details>summary{cursor:pointer;padding:12px 14px;font-weight:600;font-size:15px;list-style:none;display:flex;justify-content:space-between;align-items:center}
  details>summary::-webkit-details-marker{display:none}
  details>summary::after{content:"▾";color:var(--muted);transition:transform .15s}
  details[open]>summary::after{transform:rotate(180deg)}
  .body{padding:6px 12px 14px;border-top:1px solid var(--border)}
  .slot{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px;margin:8px 0}
  .slot h4{margin:0 0 8px;font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.03em}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .row3{display:grid;grid-template-columns:1.2fr 1fr .8fr;gap:6px;align-items:end}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}
  input,select{width:100%;background:#0c0e13;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:15px;min-height:44px}
  input[type=number]{-moz-appearance:textfield}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:0}
  input.over{border-color:var(--bad)}
  .btn{display:inline-block;background:var(--accent);color:#00233a;border:0;border-radius:10px;padding:12px 14px;font-weight:700;font-size:15px;min-height:44px;cursor:pointer}
  .btn.alt{background:#2a2f3a;color:var(--text)}
  .btn.warn{background:#3a1f1f;color:#ffb7b7}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:14px}
  .kv:last-child{border-bottom:0}
  .kv b{color:var(--text)}
  .kv span{color:var(--muted)}
  .big{font-size:36px;font-weight:800;text-align:center;margin:8px 0}
  .big.good{color:var(--good)}.big.bad{color:var(--bad)}
  .lbl-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:12px}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pos{color:var(--good)}.neg{color:var(--bad)}
  .notice{background:#1a1f14;border:1px solid #3e4a22;color:#d8e8b4;padding:8px 10px;border-radius:8px;font-size:12px;margin:8px 0}
  .fab{position:fixed;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
  .fab .btn{box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .tabs{display:flex;gap:6px;margin:10px 0;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
  .tab{flex:1;padding:12px 8px;border:1px solid var(--border);border-radius:10px;background:var(--panel);color:var(--muted);font-weight:700;font-size:14px;text-align:center;cursor:pointer;user-select:none}
  .tab.active{background:var(--accent);color:#00233a;border-color:var(--accent)}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  .muted{color:var(--muted);font-size:12px}
  input[type=range]{width:100%;accent-color:var(--accent);min-height:30px}
  .range-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}
  .range-row b{min-width:44px;text-align:right;font-variant-numeric:tabular-nums}
  .gear-sec-title{font-size:11px;color:var(--muted);margin:10px 2px 4px;letter-spacing:.05em;text-transform:uppercase;font-weight:700}
  .gear-grid{display:grid;gap:6px}
  .gear-grid.main-layout{grid-template-columns:repeat(5,1fr)}
  .gear-grid.pets{grid-template-columns:repeat(3,1fr)}
  .gear-card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:8px 6px;cursor:pointer;position:relative;min-height:96px;display:flex;flex-direction:column;user-select:none;transition:border-color .1s,background .1s}
  .gear-card.active{border-color:var(--accent);background:#102734;box-shadow:0 0 0 2px rgba(76,194,255,.3) inset}
  .gear-card.has-opts{background:#1a2230}
  .gear-card.span-2{grid-column:span 2}
  .gear-card .icon{font-size:26px;text-align:center;line-height:1;margin-top:2px}
  .gear-card .title{font-size:10px;color:var(--muted);text-align:center;margin-top:3px;font-weight:600}
  .gear-card .opts{font-size:10px;color:var(--text);margin-top:6px;line-height:1.35;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px}
  .gear-card .opt-chip{background:#0c1118;border:1px solid var(--border);border-radius:6px;padding:2px 5px;font-size:10px;color:var(--good);font-weight:600;white-space:nowrap}
  .gear-card .opt-chip.empty{color:var(--muted);background:transparent;border-style:dashed}
  .gear-card .basestat{font-size:9px;color:var(--muted);text-align:center;margin-top:3px;font-variant-numeric:tabular-nums}
  .log-tick{padding:8px 10px;border-bottom:1px dashed #222}
  .log-tick:last-child{border-bottom:0}
  .log-time{font-size:11px;color:var(--muted);margin-bottom:4px;font-variant-numeric:tabular-nums}
  .log-sides{display:grid;grid-template-columns:1fr 1fr;gap:10px}
  .log-side{display:flex;flex-direction:column;gap:3px;min-width:0}
  .log-side.en{text-align:right}
  .hpbar{height:8px;background:#0c0e13;border:1px solid var(--border);border-radius:3px;overflow:hidden;position:relative}
  .hpfill{height:100%;transition:width .2s}
  .hpfill.me{background:linear-gradient(90deg,#3bb37e,#6ee7b7);margin-right:auto}
  .hpfill.en{background:linear-gradient(90deg,#fbbf24,#f87171);margin-left:auto}
  .log-side.en .hpbar{transform:scaleX(-1)}
  .hplabel{font-size:10px;color:var(--text);font-variant-numeric:tabular-nums;white-space:nowrap}
  .log-evt{font-size:11px;color:var(--text);line-height:1.35;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .log-evt.crit{color:var(--warn);font-weight:600}
  .log-evt.block{color:var(--muted)}
  .log-evt.buff{color:var(--accent);font-weight:700}
  .log-evt.heal{color:var(--good);font-size:10px}
  .log-evt.skill{color:var(--accent)}
  @media (min-width:600px){.row{grid-template-columns:1fr 1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h1>전투력 · 대장간 계산기</h1>
  <div class="notice">⚠️ iOS Safari는 일주일 이상 안 열면 저장값을 자동 삭제할 수 있어요. 가끔 JSON 내보내기로 백업해 두세요.</div>

  <div class="tabs">
    <div class="tab active" data-tab="combat">⚔️ 전투력</div>
    <div class="tab" data-tab="forge">🔨 대장간</div>
    <div class="tab" data-tab="stones">🪜 디딤돌</div>
  </div>

  <div class="tab-panel active" id="panel-combat">
    <details open id="sec-result"><summary>📊 현재 전투력 및 1:1 실측 결과</summary><div class="body" id="result-body"></div></details>
    <details open id="sec-me"><summary>① 내 장비/펫/탈것 세팅</summary><div class="body" id="me-body"></div></details>
    <details id="sec-buff"><summary>② 연구 보정 및 버프</summary><div class="body" id="buff-body"></div></details>
    <details id="sec-enemy"><summary>③ 상대 스펙 (1:1 시뮬레이션용)</summary><div class="body" id="enemy-body"></div></details>
    <details id="sec-compare"><summary>④ 장비 교체 비교</summary><div class="body" id="cmp-body"></div></details>
    <details id="sec-recommend"><summary>⑤ 최대 효율 옵션 추천</summary><div class="body" id="rec-body"></div></details>
  </div>

  <div class="tab-panel" id="panel-forge">
    <details open id="sec-forge-me"><summary>① 내 자원</summary><div class="body" id="forge-me-body"></div></details>
    <details id="sec-forge-research"><summary>② 기술연구</summary><div class="body" id="forge-research-body"></div></details>
    <details id="sec-forge-clan"><summary>③ 클랜전 보상</summary><div class="body" id="forge-clan-body"></div></details>
    <details id="sec-forge-table"><summary>④ 대장간 레벨 테이블</summary><div class="body" id="forge-table-body"></div></details>
    <details open id="sec-forge-result"><summary>⑤ 다음 업그레이드</summary><div class="body" id="forge-result-body"></div></details>
  </div>

  <div class="tab-panel" id="panel-stones">
    <details open id="sec-stones-play"><summary>① 현재 시도</summary><div class="body" id="stones-play-body"></div></details>
    <details open id="sec-stones-stat"><summary>② 단계별 통계 & 추천</summary><div class="body" id="stones-stat-body"></div></details>
    <details id="sec-stones-history"><summary>③ 시도 기록</summary><div class="body" id="stones-history-body"></div></details>
  </div>

  <details id="sec-save"><summary>💾 저장 / 불러오기</summary><div class="body" id="save-body"></div></details>
</div>

<div class="fab">
  <button class="btn" id="btn-recalc">다시 계산</button>
  <button class="btn alt" id="btn-top">맨 위</button>
</div>

<script>
"use strict";

/* ==========================================================================
   옵션 정의 및 하드코딩 스킬 데이터
   ========================================================================== */
const OPT = [
  { id:"none",     name:"— 없음 —", max:0,   used:true },
  { id:"critRate", name:"치명타 확률",    max:12,  used:true },
  { id:"critDmg",  name:"치명타 피해",    max:100, used:true },
  { id:"block",    name:"블록 확률",      max:5,   used:true },
  { id:"hpRegen",  name:"체력 재생",      max:6,   used:false },
  { id:"hp",       name:"체력",           max:15,  used:true },
  { id:"lifesteal",name:"생명력 흡수",    max:20,  used:true },
  { id:"double",   name:"더블 찬스",      max:40,  used:true },
  { id:"dmg",      name:"피해",           max:15,  used:true },
  { id:"melee",    name:"근접 피해",      max:50,  used:false },
  { id:"ranged",   name:"원거리 피해",    max:15,  used:true },
  { id:"atkSpd",   name:"공격 속도",      max:40,  used:true },
  { id:"skillDmg", name:"스킬 피해",      max:30,  used:true },
  { id:"skillCd",  name:"스킬 쿨감(−)",   max:-7,  used:true },
];
const OPT_IDS_ENEMY = OPT.filter(o => o.id !== "none").map(o => o.id);

const FIXED_SKILLS_DEFAULT = {
  s1:   { dmg: 18200000, duration: 8, cd: 8, startTime: 3.05 },
  s2:   { dmg: 17100000, duration: 0, cd: 10, startTime: 3.05 },
  buff: { hp: 60500000, atk: 7570000, duration: 8, cd: 8, startTime: 3.05 },
  autoAnchor: 1.88 // 첫 평타 시점(초, 공속 무관). 이후는 공속주기만큼 간격
};
let FIXED_SKILLS = JSON.parse(JSON.stringify(FIXED_SKILLS_DEFAULT));
function syncFixedSkills(){ if(state && state.fixedSkills) FIXED_SKILLS = state.fixedSkills; }

const GEAR_GRID_LABELS = [
  { type: "equips", idx: 0, icon: "🪖", name: "투구" },
  { type: "equips", idx: 5, icon: "👕", name: "갑옷" },
  { type: "equips", idx: 7, icon: "🧤", name: "장갑" },
  { type: "equips", idx: 4, icon: "📿", name: "목걸이" },
  { type: "equips", idx: 2, icon: "💍", name: "반지" },
  { type: "equips", idx: 1, icon: "🗡️", name: "무기" },
  { type: "equips", idx: 6, icon: "👢", name: "신발" },
  { type: "equips", idx: 3, icon: "🏷️", name: "벨트" },
  { type: "mount",  idx: 0, icon: "🐎", name: "탈것", span: 2 }
];

const PET_LABELS = [
  { icon:"🐕", name:"펫1" },
  { icon:"🐈", name:"펫2" },
  { icon:"🦅", name:"펫3" },
];

const OPT_SHORT = {
  critRate:"치확", critDmg:"치피", block:"블록", hpRegen:"재생",
  hp:"체력", lifesteal:"흡혈", double:"더블", dmg:"피해",
  melee:"근접", ranged:"원거리", atkSpd:"공속", skillDmg:"스킬", skillCd:"쿨감"
};

const ENEMY_LABELS = {
  critRate:"치명타 확률%", critDmg:"치명타 피해%", block:"블록 확률%",
  hpRegen:"체력 재생%", hp:"체력%", lifesteal:"생명력 흡수%",
  double:"더블 찬스%", dmg:"피해%", melee:"근접 피해%", ranged:"원거리 피해%",
  atkSpd:"공격 속도%", skillDmg:"스킬 피해%", skillCd:"스킬 쿨감%"
};

/* ==========================================================================
   대장간 데이터
   ========================================================================== */
const FORGE_PERSONAL_MILESTONES = [
  { score:10000,  hammer:100, money:0 },
  { score:20000,  hammer:0,   money:5000 },
  { score:50000,  hammer:140, money:7000 },
  { score:75000,  hammer:0,   money:9800 },
  { score:100000, hammer:200, money:13700 },
  { score:150000, hammer:0,   money:19000 },
  { score:200000, hammer:280, money:27000 },
  { score:300000, hammer:380, money:0 },
  { score:400000, hammer:550, money:0 },
  { score:500000, hammer:750, money:0 },
];
const FORGE_TIER_REWARDS = {
  S: { hammerWin:8400, hammerLose:4200, moneyWin:280000, moneyLose:140000 },
  A: { hammerWin:5900, hammerLose:3000, moneyWin:196000, moneyLose: 98000 },
  B: { hammerWin:4000, hammerLose:2000, moneyWin:140000, moneyLose: 70000 },
  C: { hammerWin:2900, hammerLose:1400, moneyWin: 96000, moneyLose: 48000 },
  D: { hammerWin:2000, hammerLose:1000, moneyWin: 67000, moneyLose: 33000 },
  E: { hammerWin:1400, hammerLose: 700, moneyWin: 47000, moneyLose: 24000 },
};
const FORGE_DEFAULT_TABLE = [
  { cost: 400, time: 300 },       { cost: 700, time: 900 },
  { cost: 1500, time: 1800 },     { cost: 3500, time: 3600 },
  { cost: 10000, time: 7200 },    { cost: 25000, time: 27200 },
  { cost: 50000, time: 47200 },   { cost: 100000, time: 67200 },
  { cost: 150000, time: 87200 },  { cost: 250000, time: 107200 },
  { cost: 350000, time: 127200 }, { cost: 450000, time: 147200 },
  { cost: 600000, time: 167200 }, { cost: 800000, time: 187200 },
  { cost: 910000, time: 207200 }, { cost: 1020000, time: 227200 },
  { cost: 1130000, time: 247200 },{ cost: 1240000, time: 277200 },
  { cost: 1350000, time: 307200 },{ cost: 1460000, time: 337200 },
  { cost: 1570000, time: 367200 },{ cost: 1680000, time: 397200 },
  { cost: 1790000, time: 427200 },{ cost: 1900000, time: 457200 },
  { cost: 2010000, time: 487200 },{ cost: 2120000, time: 517200 },
  { cost: 2230000, time: 547200 },{ cost: 2340000, time: 577200 },
  { cost: 2450000, time: 607200 },{ cost: 2560000, time: 637200 },
  { cost: 2670000, time: 667200 },{ cost: 2780000, time: 697200 },
  { cost: 2890000, time: 727200 },{ cost: 3000000, time: 757200 }
];
const HAMMER_TO_MONEY = 63;
const INCOME_MONEY_PER_SEC = 1;
const INCOME_HAMMER_PER_MIN = 1;

/* ==========================================================================
   기본 상태 및 마이그레이션
   ========================================================================== */
function emptyOpt(){ return { type:"none", val:0 }; }
function emptySlot(opts){ return { hp:0, atk:0, opts: Array.from({length:opts}, emptyOpt) }; }

function defaultState(){
  return {
    equips: Array.from({length:8}, () => emptySlot(2)),
    pets:   Array.from({length:3}, () => emptySlot(2)),
    petInventory: Array.from({length:3}, () => emptySlot(2)),
    mount:  emptySlot(1),
    mountInventory: Array.from({length:3}, () => emptySlot(1)),
    buff:   { hpFlat:0, atkFlat:0 },
    research: { skillDmg:0, petAtk:0, petHp:0, mountAtk:0, mountHp:0, equips: Array.from({length:8}, ()=>({atk:0, hp:0})) },
    enemy: { hp:0, atk:0, opts: Object.fromEntries(OPT_IDS_ENEMY.map(k => [k,0])), skills: [{dmg:0, cd:0}, {dmg:0, cd:0}] },
    cmp: { slot:"equips-0", item:emptySlot(2) },
    forge: {
      money: 0, hammers: 0, level: 1, todayDungeonHammers: 0,
      research: { moneyRate:0, hammerRate:0, cost:0, time:0 },
      clan: { personalScore:0, tier:"B", win:true, claimed:false },
      table: FORGE_DEFAULT_TABLE.map(r => ({ cost:r.cost, time:r.time })),
      upgrading: { active:false, remainingSec:0 },
      hammerSaveChance: 13,
    },
    stones: {
      steps: Array.from({length:8}, () => ({ upPass:0, upFail:0, downPass:0, downFail:0 })),
      history: [], current: { step:0, choices:[] },
    },
    fixedSkills: JSON.parse(JSON.stringify(FIXED_SKILLS_DEFAULT)),
    skins: [{ dmg:0, hp:0 }, { dmg:0, hp:0 }, { dmg:0, hp:0 }],
    _activeTab: "combat",
  };
}

const LS_KEY = "combatCalcState";
let state = loadState() || defaultState();
syncFixedSkills();

function loadState(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return null;
    return migrate(JSON.parse(raw));
  } catch(e){ return null; }
}
function migrate(s){
  const d = defaultState();
  if(!Array.isArray(s.equips) || s.equips.length!==8) s.equips = d.equips;
  if(!Array.isArray(s.pets) || s.pets.length!==3) s.pets = d.pets;
  if(!Array.isArray(s.petInventory) || s.petInventory.length!==3) s.petInventory = d.petInventory;
  if(!s.mount || !Array.isArray(s.mount.opts)) s.mount = d.mount;
  else s.mount.opts = s.mount.opts.slice(0,1).concat(s.mount.opts.length===0?[emptyOpt()]:[]);
  if(!Array.isArray(s.mountInventory) || s.mountInventory.length!==3) s.mountInventory = d.mountInventory;
  else s.mountInventory = s.mountInventory.map(m => {
    if(!m || !Array.isArray(m.opts)) return emptySlot(1);
    return { hp: m.hp||0, atk: m.atk||0, opts: m.opts.slice(0,1).concat(m.opts.length===0?[emptyOpt()]:[]) };
  });

  s.buff = Object.assign({}, d.buff, s.buff||{});
  s.research = Object.assign({}, d.research, s.research||{});
  if(!Array.isArray(s.research.equips) || s.research.equips.length!==8) s.research.equips = d.research.equips;

  s.enemy = Object.assign({}, d.enemy, s.enemy||{});
  s.enemy.opts = Object.assign({}, d.enemy.opts, s.enemy.opts||{});
  s.enemy.skills = Array.isArray(s.enemy.skills) && s.enemy.skills.length===2 ? s.enemy.skills : d.enemy.skills;

  if(!s.cmp || typeof s.cmp.slot !== "string" || !s.cmp.item) s.cmp = d.cmp;

  s.forge = Object.assign({}, d.forge, s.forge||{});
  s.forge.research = Object.assign({}, d.forge.research, s.forge.research||{});
  if(s.forge.research.moneyRate === undefined) {
    s.forge.research.moneyRate = s.forge.research.rate || 0;
    s.forge.research.hammerRate = s.forge.research.rate || 0;
  }
  s.forge.clan = Object.assign({}, d.forge.clan, s.forge.clan||{});
  if(!Array.isArray(s.forge.table) || s.forge.table.length !== FORGE_DEFAULT_TABLE.length) s.forge.table = d.forge.table;
  s.forge.upgrading = Object.assign({ active:false, remainingSec:0 }, s.forge.upgrading||{});
  if(s.forge.hammerSaveChance === undefined) s.forge.hammerSaveChance = 13;

  s._activeTab = s._activeTab || "combat";
  if(!s.stones || !Array.isArray(s.stones.steps) || s.stones.steps.length!==8) s.stones = d.stones;
  else {
    s.stones.history = Array.isArray(s.stones.history) ? s.stones.history : [];
    s.stones.current = s.stones.current || { step:0, choices:[] };
    s.stones.current.choices = Array.isArray(s.stones.current.choices) ? s.stones.current.choices : [];
  }
  s.fixedSkills = s.fixedSkills || d.fixedSkills;
  s.fixedSkills.s1   = Object.assign({ startTime: 3.05 }, d.fixedSkills.s1,   s.fixedSkills.s1||{});
  s.fixedSkills.s2   = Object.assign({ startTime: 3.05 }, d.fixedSkills.s2,   s.fixedSkills.s2||{});
  s.fixedSkills.buff = Object.assign({ startTime: 3.05 }, d.fixedSkills.buff, s.fixedSkills.buff||{});
  if(s.fixedSkills.autoAnchor === undefined) s.fixedSkills.autoAnchor = 1.88;
  // 과거 값(3.03: 두 번째 평타 앵커)을 새 정의(첫 평타 = 1.88)로 자동 교체
  if(Math.abs((s.fixedSkills.autoAnchor||0) - 3.03) < 0.01) s.fixedSkills.autoAnchor = 1.88;
  if(!Array.isArray(s.skins) || s.skins.length !== 3) s.skins = d.skins;
  else s.skins = s.skins.map(x => Object.assign({dmg:0, hp:0}, x||{}));
  return s;
}
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ==========================================================================
   시뮬레이션 로직 (확률 기반 랜덤 적용)
   ========================================================================== */
function aggregateOptions(st){
  const agg = Object.fromEntries(OPT.filter(o=>o.id!=="none").map(o=>[o.id,0]));
  const allSlots = [...st.equips, ...st.pets, st.mount];
  for(const slot of allSlots){
    for(const o of slot.opts){
      if(o && o.type && o.type !== "none" && agg[o.type] !== undefined) agg[o.type] += (+o.val || 0);
    }
  }
  return agg;
}

function realCd(baseCd, skillCdSum){
  const v = +baseCd || 0;
  if(v <= 0) return Infinity;
  return Math.max(0.05, v * (1 + skillCdSum/100));
}

function computeBase(st, agg){
  const r = st.research;
  // 스킨 합산 (피해%, 체력%) — 장비 합계에만 곱해짐
  const skins = Array.isArray(st.skins) ? st.skins : [];
  const skinDmgPct = skins.reduce((s,x)=> s + (+x.dmg||0), 0);
  const skinHpPct  = skins.reduce((s,x)=> s + (+x.hp||0), 0);

  // 장비: 부위별 연구 + 전체 연구(r.equipHp, r.equipAtk) + 스킨 %
  const equipHpRaw  = st.equips.reduce((sum, eq, i) => sum + (+eq.hp||0)  * (1 + (r.equips[i]?.hp||0)/100), 0);
  const equipAtkRaw = st.equips.reduce((sum, eq, i) => sum + (+eq.atk||0) * (1 + (r.equips[i]?.atk||0)/100), 0);
  const equipHp  = equipHpRaw  * (1 + (r.equipHp||0)/100)  * (1 + skinHpPct/100);
  const equipAtk = equipAtkRaw * (1 + (r.equipAtk||0)/100) * (1 + skinDmgPct/100);

  const petHp  = st.pets.reduce((sum, eq) => sum + (+eq.hp||0), 0)  * (1 + (r.petHp||0)/100);
  const petAtk = st.pets.reduce((sum, eq) => sum + (+eq.atk||0), 0) * (1 + (r.petAtk||0)/100);
  const mntHp  = (+st.mount.hp||0)  * (1 + (r.mountHp||0)/100);
  const mntAtk = (+st.mount.atk||0) * (1 + (r.mountAtk||0)/100);

  const rawHp  = equipHp + petHp + mntHp;
  const rawAtk = equipAtk + petAtk + mntAtk;

  const buffWaitCd = realCd(FIXED_SKILLS.buff.cd, agg.skillCd);
  const buffUptime = FIXED_SKILLS.buff.duration / (FIXED_SKILLS.buff.duration + buffWaitCd);

  // 버프 OFF 기본값 (시뮬은 이 상태로 시작, 2.2초에 버프 발동)
  const totalHp_OFF_noArena = rawHp * (1 + agg.hp/100) + (+st.buff.hpFlat||0);
  const totalHp_OFF = totalHp_OFF_noArena * 5;

  // 평타 공식: base = atkCore × (1+dmg)(1+ranged) + atkBuff
  // atkCore는 "배수 곱하는 쪽" = rawAtk만 포함
  // atkBuff는 "그대로 더하는 쪽" = buff.atkFlat(상시) + 버프스킬 추가분(동적)
  const totalAtkCore = rawAtk;
  const buffAtkFlat = (+st.buff.atkFlat||0); // 상시

  // 버프스킬 발동 시 추가
  const buffHpBonus = (FIXED_SKILLS.buff.hp||0) * 5; // 결투장 ×5 반영
  const buffAtkBonus = (FIXED_SKILLS.buff.atk||0);

  // 평균 (공식·UI용)
  const avgAtkBuff = buffAtkFlat + buffAtkBonus * buffUptime;
  const totalHp = totalHp_OFF + buffHpBonus * buffUptime;
  const totalAtk = totalAtkCore + avgAtkBuff;

  return { totalHp, totalAtk, totalAtkCore, totalAtkBuff: avgAtkBuff, rawHp, rawAtk,
           equipHp, equipAtk, petHp, petAtk, mntHp, mntAtk,
           totalHp_OFF, buffAtkFlat, buffHpBonus, buffAtkBonus, buffUptime };
}

function attackPeriod(atkSpd){
  const v = Math.max(0, +atkSpd||0);
  // 구간 경계점: [공속%, 해당 공속에서의 공격 주기(초)]
  // 범위 내에서는 선형 보간으로 세분화됨
  const t = [
    [0, 1.7], [7.1, 1.6], [15.4, 1.5], [25, 1.4], [36.4, 1.3], [50, 1.2],
    [66.7, 1.1], [87.5, 1.0], [114, 0.9], [150, 0.8], [200, 0.7], [275, 0.6], [400, 0.5]
  ];
  if(v <= t[0][0]) return t[0][1];
  if(v >= t[t.length-1][0]) return t[t.length-1][1];
  for(let i=0; i<t.length-1; i++){
    const [lowX, lowT] = t[i];
    const [highX, highT] = t[i+1];
    if(v >= lowX && v <= highX){
      const ratio = (v - lowX) / (highX - lowX);
      return lowT + (highT - lowT) * ratio;
    }
  }
  return 0.5;
}

// 단일 타격: 블록 롤 → 치명 롤. detail 반환.
function rollOneHitDetail(base, cr, cd, blk){
  if (Math.random() < blk) return { dmg: 0, crit: false, blocked: true };
  const crit = Math.random() < cr;
  return { dmg: crit ? base * cd : base, crit, blocked: false };
}

function getAutoDmg(atkCore, atkBuff, opts, oppBlock, isDeterministic = false, hitList = null){
  const cr = Math.max(0, Math.min(100, opts.critRate||0))/100;
  const cd = (120 + (opts.critDmg||0))/100;
  const db = Math.max(0, Math.min(100, opts.double||0))/100;
  const blk = Math.max(0, Math.min(100, oppBlock||0))/100;
  // 평타: core는 dmg/ranged 곱 적용, buff는 그대로 더함 (게임 실측 기준)
  const base = atkCore * (1 + (opts.dmg||0)/100) * (1 + (opts.ranged||0)/100) + (atkBuff||0);

  if (isDeterministic) {
    return base * ((1-cr)*1 + cr*cd) * (1+db) * (1-blk);
  }
  const hit1 = rollOneHitDetail(base, cr, cd, blk);
  if(hitList) hitList.push(hit1);
  let total = hit1.dmg;
  if (Math.random() < db) {
    const hit2 = rollOneHitDetail(base, cr, cd, blk);
    hit2.double = true;
    if(hitList) hitList.push(hit2);
    total += hit2.dmg;
  }
  return total;
}

// 스킬 전용 타격: 치명 없음, 블록만 적용
function rollSkillHitDetail(base, blk){
  if (Math.random() < blk) return { dmg: 0, crit: false, blocked: true };
  return { dmg: base, crit: false, blocked: false };
}

function getSkillFlatDmg(flatBase, opts, oppBlock, researchSkillDmg, isDeterministic = false, hitList = null){
  // 스킬은 치명·더블 모두 미적용. 블록만 적용. (1타 고정)
  const blk = Math.max(0, Math.min(100, oppBlock||0))/100;
  const base = flatBase * (1 + (opts.dmg||0)/100) * (1 + ((opts.skillDmg||0) + (researchSkillDmg||0))/100);

  if (isDeterministic) {
    return base * (1 - blk);
  }
  const hit = rollSkillHitDetail(base, blk);
  if(hitList) hitList.push(hit);
  return hit.dmg;
}

function simulate(me, en, isDeterministic = false, collectLog = false){
  const dtMs = 100;
  const tMaxMs = 120000;
  // 버프 OFF 상태로 시작. 2.2초에 버프 발동 시 HP/ATK 증가
  let myMax = me.totalHp_OFF || me.totalHp;
  let enMax = en.totalHp_OFF || en.totalHp;
  let myHp = myMax, enHp = enMax;
  // 상시 buff.atkFlat는 기본값, 버프스킬 발동 시 buffAtkBonus 추가
  let myCurrAtkBuff = (me.buffAtkFlat||0);
  let enCurrAtkBuff = (en.buffAtkFlat||0);

  const myAutoP = attackPeriod(me.opts.atkSpd);
  const enAutoP = attackPeriod(en.opts.atkSpd);
  const myAutoMs = Math.round(myAutoP * 1000);
  const enAutoMs = Math.round(enAutoP * 1000);

  const myLife = Math.max(0, +(me.opts.lifesteal||0))/100;
  const enLife = Math.max(0, +(en.opts.lifesteal||0))/100;

  const myS1Cd = realCd(me.isMe ? FIXED_SKILLS.s1.cd : (me.skills?.[0]?.cd||0), me.opts.skillCd);
  const myS2Cd = realCd(me.isMe ? FIXED_SKILLS.s2.cd : (me.skills?.[1]?.cd||0), me.opts.skillCd);
  const enS1Cd = realCd(en.isMe ? FIXED_SKILLS.s1.cd : (en.skills?.[0]?.cd||0), en.opts.skillCd);
  const enS2Cd = realCd(en.isMe ? FIXED_SKILLS.s2.cd : (en.skills?.[1]?.cd||0), en.opts.skillCd);

  const myS1Cycle = (me.isMe ? FIXED_SKILLS.s1.duration : 0) + myS1Cd;
  const myS2Cycle = (me.isMe ? FIXED_SKILLS.s2.duration : 0) + myS2Cd;
  const enS1Cycle = (en.isMe ? FIXED_SKILLS.s1.duration : 0) + enS1Cd;
  const enS2Cycle = (en.isMe ? FIXED_SKILLS.s2.duration : 0) + enS2Cd;

  const myS1DmgBase = me.isMe ? FIXED_SKILLS.s1.dmg : (me.skills?.[0]?.dmg||0);
  const myS2DmgBase = me.isMe ? FIXED_SKILLS.s2.dmg : (me.skills?.[1]?.dmg||0);
  const enS1DmgBase = en.isMe ? FIXED_SKILLS.s1.dmg : (en.skills?.[0]?.dmg||0);
  const enS2DmgBase = en.isMe ? FIXED_SKILLS.s2.dmg : (en.skills?.[1]?.dmg||0);

  // 첫 auto 시점 = autoAnchor (공속과 무관한 고정 시각). 이후 += autoMs.
  const autoAnchorMs = Math.max(0, Math.round((FIXED_SKILLS.autoAnchor||1.88) * 1000));
  let myNextAuto = myAutoMs > 0 ? autoAnchorMs : Infinity;
  let enNextAuto = enAutoMs > 0 ? autoAnchorMs : Infinity;

  // 첫 스킬 발동 = 전투 시작 후 startTime(초) 고정 시점 (공속과 무관)
  const s1StartMs = Math.max(50, Math.round((FIXED_SKILLS.s1.startTime||2.2) * 1000));
  const s2StartMs = Math.max(50, Math.round((FIXED_SKILLS.s2.startTime||2.2) * 1000));
  const buffStartMs = Math.max(50, Math.round((FIXED_SKILLS.buff.startTime||2.2) * 1000));
  let myNextS1 = myS1DmgBase > 0 && myS1Cd !== Infinity ? s1StartMs : Infinity;
  let myNextS2 = myS2DmgBase > 0 && myS2Cd !== Infinity ? s2StartMs : Infinity;
  let enNextS1 = enS1DmgBase > 0 && enS1Cd !== Infinity ? s1StartMs : Infinity;
  let enNextS2 = enS2DmgBase > 0 && enS2Cd !== Infinity ? s2StartMs : Infinity;

  // 버프스킬: 고정 시점 첫 발동, 지속 duration초, 쿨타임 cd초 (skillCd 옵션 반영)
  const buffDurMs = (FIXED_SKILLS.buff.duration||0) * 1000;
  const myBuffCdSec = realCd(FIXED_SKILLS.buff.cd, me.opts.skillCd);
  const enBuffCdSec = realCd(FIXED_SKILLS.buff.cd, en.opts.skillCd);
  const myBuffCdMs = myBuffCdSec === Infinity ? Infinity : Math.max(50, Math.round(myBuffCdSec * 1000));
  const enBuffCdMs = enBuffCdSec === Infinity ? Infinity : Math.max(50, Math.round(enBuffCdSec * 1000));
  const myHasBuff = (me.buffHpBonus||0) > 0 || (me.buffAtkBonus||0) > 0;
  const enHasBuff = (en.buffHpBonus||0) > 0 || (en.buffAtkBonus||0) > 0;
  let myNextBuff = myHasBuff ? buffStartMs : Infinity;
  let enNextBuff = enHasBuff ? buffStartMs : Infinity;
  let myBuffEndMs = -1, enBuffEndMs = -1;

  let myTotalDealt = 0;
  let enTotalDealt = 0;
  const log = [];

  let tMs = 0;
  while(tMs < tMaxMs){
    tMs += dtMs;
    let myDealtThisTick = 0, enDealtThisTick = 0;
    let myAutoDealt = 0, enAutoDealt = 0;
    let myS1Dealt = 0, myS2Dealt = 0, enS1Dealt = 0, enS2Dealt = 0;

    // 타격 디테일 수집(로그 수집 시에만)
    const myAutoHits = collectLog ? [] : null;
    const myS1Hits = collectLog ? [] : null;
    const myS2Hits = collectLog ? [] : null;
    const enAutoHits = collectLog ? [] : null;
    const enS1Hits = collectLog ? [] : null;
    const enS2Hits = collectLog ? [] : null;
    let myBuffStarted = false, myBuffEnded = false, enBuffStarted = false, enBuffEnded = false;

    // 버프 발동/종료 (공격 처리 전)
    if(myNextBuff !== Infinity && tMs >= myNextBuff){
      myMax += (me.buffHpBonus||0);
      myHp += (me.buffHpBonus||0);
      myCurrAtkBuff = (me.buffAtkFlat||0) + (me.buffAtkBonus||0);
      myBuffEndMs = tMs + buffDurMs;
      myNextBuff = Infinity;
      myBuffStarted = true;
    }
    if(myBuffEndMs > 0 && tMs >= myBuffEndMs){
      myMax = Math.max(0, myMax - (me.buffHpBonus||0));
      myHp = Math.min(myHp, myMax);
      myCurrAtkBuff = (me.buffAtkFlat||0);
      myBuffEndMs = -1;
      myNextBuff = (myBuffCdMs === Infinity) ? Infinity : tMs + myBuffCdMs;
      myBuffEnded = true;
    }
    if(enNextBuff !== Infinity && tMs >= enNextBuff){
      enMax += (en.buffHpBonus||0);
      enHp += (en.buffHpBonus||0);
      enCurrAtkBuff = (en.buffAtkFlat||0) + (en.buffAtkBonus||0);
      enBuffEndMs = tMs + buffDurMs;
      enNextBuff = Infinity;
      enBuffStarted = true;
    }
    if(enBuffEndMs > 0 && tMs >= enBuffEndMs){
      enMax = Math.max(0, enMax - (en.buffHpBonus||0));
      enHp = Math.min(enHp, enMax);
      enCurrAtkBuff = (en.buffAtkFlat||0);
      enBuffEndMs = -1;
      enNextBuff = (enBuffCdMs === Infinity) ? Infinity : tMs + enBuffCdMs;
      enBuffEnded = true;
    }

    if(tMs >= myNextAuto){
      const dmg = getAutoDmg(me.totalAtkCore, myCurrAtkBuff, me.opts, en.opts.block, isDeterministic, myAutoHits);
      myAutoDealt += dmg; myDealtThisTick += dmg;
      myNextAuto += myAutoMs;
    }
    if(tMs >= myNextS1){
      const d = getSkillFlatDmg(myS1DmgBase, me.opts, en.opts.block, me.research?.skillDmg||0, isDeterministic, myS1Hits);
      myS1Dealt += d; myDealtThisTick += d;
      myNextS1 += Math.max(50, Math.round(myS1Cycle * 1000));
    }
    if(tMs >= myNextS2){
      const d = getSkillFlatDmg(myS2DmgBase, me.opts, en.opts.block, me.research?.skillDmg||0, isDeterministic, myS2Hits);
      myS2Dealt += d; myDealtThisTick += d;
      myNextS2 += Math.max(50, Math.round(myS2Cycle * 1000));
    }

    if(tMs >= enNextAuto){
      const dmg = getAutoDmg(en.totalAtkCore, enCurrAtkBuff, en.opts, me.opts.block, isDeterministic, enAutoHits);
      enAutoDealt += dmg; enDealtThisTick += dmg;
      enNextAuto += enAutoMs;
    }
    if(tMs >= enNextS1){
      const d = getSkillFlatDmg(enS1DmgBase, en.opts, me.opts.block, en.research?.skillDmg||0, isDeterministic, enS1Hits);
      enS1Dealt += d; enDealtThisTick += d;
      enNextS1 += Math.max(50, Math.round(enS1Cycle * 1000));
    }
    if(tMs >= enNextS2){
      const d = getSkillFlatDmg(enS2DmgBase, en.opts, me.opts.block, en.research?.skillDmg||0, isDeterministic, enS2Hits);
      enS2Dealt += d; enDealtThisTick += d;
      enNextS2 += Math.max(50, Math.round(enS2Cycle * 1000));
    }

    enHp -= myDealtThisTick;
    myHp -= enDealtThisTick;

    myTotalDealt += myDealtThisTick;
    enTotalDealt += enDealtThisTick;

    const myHeal = myAutoDealt > 0 ? myAutoDealt * myLife : 0;
    const enHeal = enAutoDealt > 0 ? enAutoDealt * enLife : 0;
    if(myHeal > 0) myHp = Math.min(myMax, myHp + myHeal);
    if(enHeal > 0) enHp = Math.min(enMax, enHp + enHeal);

    if(collectLog && (myDealtThisTick > 0 || enDealtThisTick > 0 || myBuffStarted || myBuffEnded || enBuffStarted || enBuffEnded)){
      log.push({ t:tMs/1000,
                 myAuto:myAutoDealt, myS1:myS1Dealt, myS2:myS2Dealt, myHeal,
                 enAuto:enAutoDealt, enS1:enS1Dealt, enS2:enS2Dealt, enHeal,
                 myAutoHits, myS1Hits, myS2Hits, enAutoHits, enS1Hits, enS2Hits,
                 myBuffStarted, myBuffEnded, enBuffStarted, enBuffEnded,
                 myHp:Math.max(0,myHp), enHp:Math.max(0,enHp),
                 myMaxTick: myMax, enMaxTick: enMax });
    }

    const meDead = myHp <= 0, enDead = enHp <= 0;
    if(meDead && enDead) return { winner:"draw", myHp:0, enHp:0, t:tMs/1000, myMax, enMax, timeout:false, myTotalDealt, enTotalDealt, log };
    if(enDead) return { winner:"me", myHp:Math.max(0,myHp), enHp:0, t:tMs/1000, myMax, enMax, timeout:false, myTotalDealt, enTotalDealt, log };
    if(meDead) return { winner:"en", myHp:0, enHp:Math.max(0,enHp), t:tMs/1000, myMax, enMax, timeout:false, myTotalDealt, enTotalDealt, log };
  }
  const myFrac = myHp/myMax, enFrac = enHp/enMax;
  return { winner: myFrac>enFrac?"me":(myFrac<enFrac?"en":"draw"), myHp:Math.max(0,myHp), enHp:Math.max(0,enHp), t:tMaxMs/1000, myMax, enMax, timeout:true, myTotalDealt, enTotalDealt, log };
}

function buildMe(st){
  const agg = aggregateOptions(st);
  const base = computeBase(st, agg);
  return { isMe: true, totalHp: base.totalHp, totalAtk: base.totalAtk,
           totalAtkCore: base.totalAtkCore, totalAtkBuff: base.totalAtkBuff,
           totalHp_OFF: base.totalHp_OFF,
           buffAtkFlat: base.buffAtkFlat,
           buffHpBonus: base.buffHpBonus, buffAtkBonus: base.buffAtkBonus,
           opts: agg, research: st.research,
           _rawHp: base.rawHp, _rawAtk: base.rawAtk,
           _equipHp: base.equipHp, _equipAtk: base.equipAtk };
}

function buildPresetEnemy(st, fallbackHp, fallbackAtk){
  let enHp = +st.enemy.hp || 0;
  let enAtk = +st.enemy.atk || 0;

  if(enHp <= 0) enHp = (fallbackHp || 100000) / 5;
  if(enAtk <= 0) enAtk = fallbackAtk || 10000;

  const presetDist = { critRate: 7, critDmg: 7, atkSpd: 6, double: 2, lifesteal: 1, dmg: 1, hp: 0, block: 0, ranged: 0, skillDmg: 0, skillCd: 0, hpRegen: 0, melee: 0 };
  const presetAgg = aggregateFromDist(presetDist);

  // 적도 버프스킬 사용 (내 FIXED_SKILLS와 동일)
  const presetBuffCdSec = realCd(FIXED_SKILLS.buff.cd, presetAgg.skillCd||0);
  const presetBuffUptime = FIXED_SKILLS.buff.duration / (FIXED_SKILLS.buff.duration + presetBuffCdSec);
  const presetBuffHpBonus = (FIXED_SKILLS.buff.hp||0) * 5;
  const presetBuffAtkBonus = (FIXED_SKILLS.buff.atk||0);

  return {
    isMe: false,
    totalHp: enHp * 5 + presetBuffHpBonus * presetBuffUptime,
    totalHp_OFF: enHp * 5,
    totalAtk: enAtk + presetBuffAtkBonus * presetBuffUptime,
    totalAtkCore: enAtk,
    totalAtkBuff: presetBuffAtkBonus * presetBuffUptime,
    buffAtkFlat: 0,
    buffHpBonus: presetBuffHpBonus,
    buffAtkBonus: presetBuffAtkBonus,
    opts: presetAgg,
    skills: [
      { dmg: FIXED_SKILLS.s1.dmg, cd: FIXED_SKILLS.s1.cd },
      { dmg: FIXED_SKILLS.s2.dmg, cd: FIXED_SKILLS.s2.cd }
    ],
    research: st.research
  };
}

function buildCustomEnemy(st, fallbackHp, fallbackAtk){
  let enHp = +st.enemy.hp || 0;
  let enAtk = +st.enemy.atk || 0;
  if(enHp <= 0) enHp = (fallbackHp || 100000) / 5;
  if(enAtk <= 0) enAtk = fallbackAtk || 10000;

  // 커스텀 적도 버프스킬 사용 (내 FIXED_SKILLS와 동일)
  const customAgg = Object.fromEntries(OPT_IDS_ENEMY.map(k => [k, +st.enemy.opts[k]||0]));
  const customBuffCdSec = realCd(FIXED_SKILLS.buff.cd, customAgg.skillCd||0);
  const customBuffUptime = FIXED_SKILLS.buff.duration / (FIXED_SKILLS.buff.duration + customBuffCdSec);
  const customBuffHpBonus = (FIXED_SKILLS.buff.hp||0) * 5;
  const customBuffAtkBonus = (FIXED_SKILLS.buff.atk||0);

  return {
    isMe: false,
    totalHp: enHp * 5 + customBuffHpBonus * customBuffUptime,
    totalHp_OFF: enHp * 5,
    totalAtk: enAtk + customBuffAtkBonus * customBuffUptime,
    totalAtkCore: enAtk,
    totalAtkBuff: customBuffAtkBonus * customBuffUptime,
    buffAtkFlat: 0,
    buffHpBonus: customBuffHpBonus,
    buffAtkBonus: customBuffAtkBonus,
    opts: customAgg,
    skills: [
      { dmg: +st.enemy.skills[0].dmg||0, cd: +st.enemy.skills[0].cd||0 },
      { dmg: +st.enemy.skills[1].dmg||0, cd: +st.enemy.skills[1].cd||0 }
    ],
    research: { skillDmg:0 }
  };
}

function powerScore(sim){
  const myFrac = sim.myHp / Math.max(1, sim.myMax);
  const enFrac = sim.enHp / Math.max(1, sim.enMax);
  if(sim.winner === "me")  return 10000 + myFrac*5000 - sim.t*10;
  if(sim.winner === "en")  return (1 - enFrac) * 3000;
  return 5000 + (myFrac - enFrac) * 2500;
}

function aggregateFromDist(dist){
  const agg = Object.fromEntries(OPT.filter(o=>o.id!=="none").map(o=>[o.id,0]));
  for(const [id, count] of Object.entries(dist)){
    const opt = OPT.find(o => o.id === id);
    if(opt && opt.used) agg[id] = count * opt.max;
  }
  return agg;
}

// 공식 기반 전투력 계산: 내 DPS × 내 생존시간
// - DPS = auto + 스킬1 + 스킬2 (치명/더블/블록 기댓값 반영)
// - 흡혈 = 내 auto DPS × lifesteal% → 상대 DPS 상쇄 → 생존시간 증가
// - 예: 흡혈 10/초로 상대 DPS 100 → 실효 90 → HP 1000이면 11.11초 생존
function cpFormula(me, en){
  const myAutoP = attackPeriod(me.opts.atkSpd);
  const enAutoP = attackPeriod(en.opts.atkSpd);

  const myAutoDmg = getAutoDmg(me.totalAtkCore, me.totalAtkBuff, me.opts, en.opts.block, true);
  const enAutoDmg = getAutoDmg(en.totalAtkCore, en.totalAtkBuff, en.opts, me.opts.block, true);
  const myAutoDPS = myAutoP > 0 ? myAutoDmg / myAutoP : 0;
  const enAutoDPS = enAutoP > 0 ? enAutoDmg / enAutoP : 0;

  const skillDPS = (side, oppBlock) => {
    let dps = 0;
    for(let i=0; i<2; i++){
      const key = "s"+(i+1);
      const dmgBase = side.isMe ? FIXED_SKILLS[key].dmg : (side.skills?.[i]?.dmg||0);
      if(dmgBase <= 0) continue;
      const cdBase  = side.isMe ? FIXED_SKILLS[key].cd  : (side.skills?.[i]?.cd||0);
      const cdReal  = realCd(cdBase, side.opts.skillCd);
      if(cdReal === Infinity) continue;
      const duration = side.isMe ? FIXED_SKILLS[key].duration : 0;
      const cycle = duration + cdReal;
      if(cycle <= 0) continue;
      dps += getSkillFlatDmg(dmgBase, side.opts, oppBlock, side.research?.skillDmg||0, true) / cycle;
    }
    return dps;
  };
  const mySkillDPS = skillDPS(me, en.opts.block);
  const enSkillDPS = skillDPS(en, me.opts.block);

  const myDPS = myAutoDPS + mySkillDPS;
  const enDPS = enAutoDPS + enSkillDPS;

  // 흡혈은 일반공격에만 적용 → 상대 DPS 상쇄
  const myLife = Math.max(0, +(me.opts.lifesteal||0))/100;
  const enLife = Math.max(0, +(en.opts.lifesteal||0))/100;
  const myHealRate = myAutoDPS * myLife;
  const enHealRate = enAutoDPS * enLife;

  const effEnDPS = Math.max(0.01, enDPS - myHealRate);
  const effMyDPS = Math.max(0.01, myDPS - enHealRate);
  const mySurvivalSec = me.totalHp / effEnDPS;
  const enKillTime = en.totalHp / effMyDPS; // 내가 상대를 죽이는 데 걸리는 시간

  // 전투력: 실제 전투 종료 시점까지만 DPS 유효 (초과 생존시간은 의미 없음)
  // - 승리: 상대 HP 다 깎음 + 여유시간 × 내 DPS 추가
  // - 패배: 내가 죽기 전까지 준 총 피해 = myDPS × mySurvivalSec
  let score;
  let winner;
  if(mySurvivalSec >= enKillTime){
    winner = "me";
    score = en.totalHp + myDPS * (mySurvivalSec - enKillTime);
  } else {
    winner = "en";
    score = myDPS * mySurvivalSec;
  }
  return { score, winner, myDPS, enDPS, myAutoDPS, enAutoDPS, mySkillDPS, enSkillDPS, myHealRate, enHealRate, mySurvivalSec, enKillTime };
}

function currentCPScore(st){
  const me = buildMe(st);
  const en = buildPresetEnemy(st, me.totalHp, me.totalAtk);
  return cpFormula(me, en).score;
}

function bestBuildCPScore(st){
  const me = buildMe(st);
  const en = buildPresetEnemy(st, me.totalHp, me.totalAtk);

  const presetDist = { critRate: 7, critDmg: 7, atkSpd: 6, double: 2, lifesteal: 1, dmg: 1, hp: 0, block: 0, ranged: 0, skillDmg: 0, skillCd: 0, hpRegen: 0, melee: 0 };
  const presetAgg = aggregateFromDist(presetDist);
  const presetBase = computeBase(st, presetAgg);
  const presetMe = { isMe: true, totalHp: presetBase.totalHp, totalAtk: presetBase.totalAtk,
                     totalAtkCore: presetBase.totalAtkCore, totalAtkBuff: presetBase.totalAtkBuff,
                     opts: presetAgg, research: st.research };
  return cpFormula(presetMe, en).score;
}

/* ==========================================================================
   DOM 렌더링 함수 & UI 컴포넌트
   ========================================================================== */
function h(tag, attrs, ...kids){
  const el = document.createElement(tag);
  if(attrs) for(const [k,v] of Object.entries(attrs)){
    if(k==="class") el.className = v;
    else if(k==="html") el.innerHTML = v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2), v);
    else if(v===true) el.setAttribute(k,"");
    else if(v!==false && v!=null) el.setAttribute(k, v);
  }
  for(const k of kids){
    if(k==null) continue;
    el.append(k.nodeType ? k : document.createTextNode(k));
  }
  return el;
}

function numInput(value, onchange, opts={}){
  return h("input", {
    type:"number", inputmode:"decimal", step:"any",
    value: (value==null||isNaN(value))?"":value,
    placeholder: opts.placeholder||"0",
    onchange:(e)=>{ const v = parseFloat(e.target.value); onchange(isNaN(v)?0:v); }
  });
}

function unitNumInput(value, onchange, opts={}){
   let d = value || 0;
   let u = 1;
   if (d > 0 && d >= 1e9 && d % 1e7 === 0) { d /= 1e9; u = 1e9; }
   else if (d > 0 && d >= 1e6 && d % 1e4 === 0) { d /= 1e6; u = 1e6; }
   else if (d > 0 && d >= 1e3 && d % 1e1 === 0) { d /= 1e3; u = 1e3; }

   const inp = h("input", { type:"number", inputmode:"decimal", step:"any", value: d===0?"":d, placeholder: opts.placeholder||"0" });
   const sel = h("select", { style:"width:65px; margin-left:6px; padding:0 4px; border-radius:8px;" },
      h("option", {value:1, selected: u===1}, "-"),
      h("option", {value:1e3, selected: u===1e3}, "k (천)"),
      h("option", {value:1e6, selected: u===1e6}, "m (백만)"),
      h("option", {value:1e9, selected: u===1e9}, "b (십억)")
   );
   const upd = () => {
      const val = (parseFloat(inp.value)||0) * parseFloat(sel.value);
      onchange(val);
   };
   inp.addEventListener("change", upd);
   sel.addEventListener("change", upd);
   return h("div", {style:"display:flex; width:100%"}, inp, sel);
}

function selectUI(options, value, onchange){
  const sel = h("select", { onchange:(e)=>onchange(e.target.value) });
  for(const o of options){
    const opt = h("option", {value:o.id}, o.name);
    if(o.id === value) opt.selected = true;
    sel.append(opt);
  }
  return sel;
}

function renderOptRow(opt, onTypeChange, onValChange){
  const typeSel = selectUI(OPT, opt.type||"none", onTypeChange);
  const valInp = numInput(opt.val, onValChange);
  const def = OPT.find(o=>o.id===(opt.type||"none"));
  if(def && def.id!=="none"){
    const over = def.max < 0 ? (opt.val < def.max) : (opt.val > def.max);
    if(over) valInp.classList.add("over");
  }
  const maxHint = (def && def.id!=="none") ? h("div",{class:"lbl-sub"}, `max ${def.max}%`) : h("div",{class:"lbl-sub"}, "");
  return h("div",{class:"row3"}, h("div", null, h("label", null, "옵션 종류"), typeSel), h("div", null, h("label", null, "수치(%)"), valInp), maxHint);
}

function gearCard(slot, label, key, active){
  const chips = slot.opts.map(o => {
    if(!o || o.type==="none") return h("span",{class:"opt-chip empty"}, "—");
    const sh = OPT_SHORT[o.type] || o.type;
    return h("span",{class:"opt-chip"}, `${sh} ${o.val}`);
  });
  const hasOpts = slot.opts.some(o => o && o.type!=="none");
  const formatCompact = (n) => {
    if(n>=1e9) return (n/1e9).toFixed(1).replace(/\.0$/,'')+'b';
    if(n>=1e6) return (n/1e6).toFixed(1).replace(/\.0$/,'')+'m';
    if(n>=1e3) return (n/1e3).toFixed(1).replace(/\.0$/,'')+'k';
    return Math.round(n);
  };
  const baseTxt = (slot.hp||slot.atk) ? `H ${formatCompact(slot.hp||0)} · A ${formatCompact(slot.atk||0)}` : "";
  return h("div", {
    class: "gear-card" + (active?" active":"") + (hasOpts?" has-opts":""),
    onclick: ()=>{ state._selectedSlot = key; saveState(); renderMe(); }
  },
    h("div",{class:"icon"}, label.icon),
    h("div",{class:"title"}, label.name),
    h("div",{class:"opts"}, ...chips),
    baseTxt ? h("div",{class:"basestat"}, baseTxt) : null
  );
}

  ));
  for(let i=0;i<slot.opts.length;i++){

    body.append(renderOptRow(opt, t => { opt.type = t; onAnyChange(); renderMe(); }, v => { opt.val = v; onAnyChange(); renderMe(); }));
  }

  if (kind === "petInv") {
    const swapResult = h("div",{id:"pet-swap-result"});
    const buttonGroup = h("div", {style:"display:grid;grid-template-columns:repeat(3,1fr);gap:8px"});

        h("button",{class:"btn alt", onclick:()=>{
          const temp = state.pets[i];
          state.pets[i] = state.petInventory[idx];
          state.petInventory[idx] = temp;
          state._selectedSlot = `pets-${i}`;
          onAnyChange(); renderMe();
        }}, `✅ 펫${i+1} 장착`)
      ));
    }
    body.append(h("div", {class:"slot", style:"margin-top:10px"},
      h("h4",null,"본 슬롯 펫과 비교/장착"),
      h("p",{class:"muted",style:"margin:4px 0 8px"},"장착 전에 각 펫 자리와 1:1 시뮬로 누가 이기는지 먼저 확인할 수 있습니다."),
      buttonGroup,
      swapResult
    ));
  } else if (kind === "pets") {
    body.append(h("div", {class:"slot", style:"margin-top:10px"},
      h("h4",null,"보관함 펫과 맞교환"),
      h("div",{class:"btnrow"}, ...[0,1,2].map(i => h("button",{class:"btn alt", onclick:()=>{
           const temp = state.petInventory[i];
           state.petInventory[i] = state.pets[idx];
           state.pets[idx] = temp;
           state._selectedSlot = `petInv-${i}`;
           onAnyChange(); renderMe();
        }}, `보관 ${i+1} 이동`)))
    ));
  } else if (kind === "mountInv") {
    const swapResult = h("div",{id:"mount-swap-result"});
    body.append(h("div", {class:"slot", style:"margin-top:10px"},
      h("h4",null,"현재 탈것과 비교/장착"),
      h("p",{class:"muted",style:"margin:4px 0 8px"},"장착 전에 현재 탈것과 1:1 시뮬로 누가 이기는지 확인 가능."),
      h("div",{class:"btnrow"},
        h("button",{class:"btn", onclick:function(){ simulateMountSwap(idx, swapResult, this); }}, "⚡ 현재 탈것과 전투"),
        h("button",{class:"btn alt", onclick:()=>{
           const temp = state.mount;
           state.mount = state.mountInventory[idx];
           state.mountInventory[idx] = temp;
           state._selectedSlot = `mount-0`;
           onAnyChange(); renderMe();
        }}, "✅ 탈것 장착")
      ),
      swapResult
    ));
  }
  return body;
}

async function simulateMountSwap(invIdx, resultDiv, btn){
  const origText = btn.textContent;
  btn.disabled = true; btn.textContent = "계산 중…";
  resultDiv.innerHTML = "";
  await new Promise(r=>setTimeout(r, 30));
  try {
    const meA = buildMe(state);
    const origMount = state.mount;
    const origInv = state.mountInventory[invIdx];
    let meB;
    try {
      state.mount = origInv;
      state.mountInventory[invIdx] = origMount;
      meB = buildMe(state);
    } finally {
      state.mount = origMount;
      state.mountInventory[invIdx] = origInv;
    }
    const labelA = "현재 탈것";
    const labelB = `보관${invIdx+1}`;
    const scoreA = cpAgainstPreset(meA);
    const scoreB = cpAgainstPreset(meB);
    const result = await runBattleRepeats(meA, meB, 1000, btn);
    resultDiv.append(renderWinRateBox(`⚡ 탈것 교체 비교`, labelA, labelB, result, scoreA, scoreB));
    const logEl = renderCombatLog(result.sampleSim, labelA, labelB);
    if(logEl) resultDiv.append(logEl);
  } finally {
    btn.disabled = false; btn.textContent = origText;
  }
}

  const petInvGrid = h("div",{class:"gear-grid pets",style:"margin-top:6px"});
  state.petInventory.forEach((s,i)=> petInvGrid.append(gearCard(s, {icon:"💤", name:`보관 ${i+1}`}, `petInv-${i}`, selected===`petInv-${i}`)));

  const mntInvDet = h("details", { style:"margin-top:10px" });

  mntInvDet.append(h("summary",{class:"gear-sec-title",style:"cursor:pointer;margin:0;padding:8px 4px"},"💤 탈것 보관함"));
  const mntInvGrid = h("div",{class:"gear-grid pets",style:"margin-top:6px"});
  state.mountInventory.forEach((s,i)=> mntInvGrid.append(gearCard(s, {icon:"🐴", name:`보관 ${i+1}`}, `mountInv-${i}`, selected===`mountInv-${i}`)));
  mntInvDet.append(mntInvGrid);
  if(isMntInvSelected) mntInvDet.append(renderGearEditor(selected));
  host.append(mntInvDet);

  // 보관함이 아닌 슬롯만 메인 편집 패널 표시
  if(!isPetInvSelected && !isMntInvSelected){
    host.append(renderGearEditor(selected));
  }
}

// 1000회 시뮬 공통 헬퍼 — 첫 1회만 로그 수집
async function runBattleRepeats(meA, meB, runs, btn){
  let aWin=0, bWin=0, draw=0;
  let sampleSim = null;
  for(let i=0; i<runs; i++){
    const sim = simulate(meA, meB, false, i === 0);
    if(sim.winner === "me") aWin++;
    else if(sim.winner === "en") bWin++;
    else draw++;
    if(i === 0) sampleSim = sim;
    if(i > 0 && i % 50 === 0){
      if(btn) btn.textContent = `계산 중 ${i}/${runs}`;
      await new Promise(r => setTimeout(r, 0));
    }
  }
  return { aWin, bWin, draw, sampleSim, runs };
}

function renderWinRateBox(title, aLabel, bLabel, r, scoreA, scoreB){
  const aPct = (r.aWin/r.runs*100).toFixed(1);
  const bPct = (r.bWin/r.runs*100).toFixed(1);
  const drawPct = (r.draw/r.runs*100).toFixed(1);
  const winner = r.aWin > r.bWin ? "a" : (r.bWin > r.aWin ? "b" : "tie");
  const winLabel = winner === "a" ? `${aLabel} ✔` : (winner === "b" ? `${bLabel} ✔` : "접전");
  const diff = (scoreA!=null && scoreB!=null) ? scoreB - scoreA : null;
  const diffPct = (diff!=null && Math.abs(scoreA)>1) ? (diff/Math.abs(scoreA)*100) : null;

  const box = h("div",{class:"slot",style:"margin-top:10px"},
    h("h4",null,title + ` (${r.runs}회 시뮬)`),
    kv("우세", h("b",{class:winner==="a"?"pos":(winner==="b"?"neg":"")}, winLabel))
  );
  if(scoreA!=null && scoreB!=null){
    box.append(
      kv(`${aLabel} 전투력`, Math.round(scoreA).toLocaleString()),
      kv(`${bLabel} 전투력`, Math.round(scoreB).toLocaleString() + (diffPct!=null ? `  (${diff>=0?"+":""}${diffPct.toFixed(2)}%)` : ""))
    );
  }
  box.append(
    kv(`${aLabel} 승`, `${r.aWin}회 (${aPct}%)`),
    kv(`${bLabel} 승`, `${r.bWin}회 (${bPct}%)`),
    kv("무승부", `${r.draw}회 (${drawPct}%)`),
    h("p",{class:"muted",style:"margin-top:8px"},
      winner==="b" ? `→ ${bLabel}이(가) 더 강합니다.` :
      winner==="a" ? `→ ${aLabel}이(가) 더 강합니다.` :
      "→ 거의 대등합니다."
    )
  );
  return box;
}

// 프리셋 더미 기준 전투력 점수 (표준 지표)
function cpAgainstPreset(me){
  const en = buildPresetEnemy(state, me.totalHp, me.totalAtk);
  return cpFormula(me, en).score;
}

// 보관함 펫과 장착 펫 교체 시, 두 빌드를 서로 싸우게 해 승자 판정
async function simulatePetSwap(petIdx, invIdx, resultDiv, btn){
  const origText = btn.textContent;
  btn.disabled = true; btn.textContent = "계산 중…";
  resultDiv.innerHTML = "";
  await new Promise(r=>setTimeout(r, 30));
  try {
    const meA = buildMe(state);
    const origPet = state.pets[petIdx];
    const origInv = state.petInventory[invIdx];
    let meB;
    try {
      state.pets[petIdx] = origInv;
      state.petInventory[invIdx] = origPet;
      meB = buildMe(state);
    } finally {
      state.pets[petIdx] = origPet;
      state.petInventory[invIdx] = origInv;
    }
    const labelA = `현재(펫${petIdx+1})`;
    const labelB = `교체(보관${invIdx+1})`;
    const scoreA = cpAgainstPreset(meA);
    const scoreB = cpAgainstPreset(meB);
    const result = await runBattleRepeats(meA, meB, 1000, btn);
    resultDiv.append(renderWinRateBox(`⚡ 펫${petIdx+1} 자리 교체 비교`, labelA, labelB, result, scoreA, scoreB));
    const logEl = renderCombatLog(result.sampleSim, labelA, labelB);
    if(logEl) resultDiv.append(logEl);
  } finally {
    btn.disabled = false; btn.textContent = origText;
  }
}

function kv(label, val){

function fmtN(n){
  n = Math.round(n);
  if(Math.abs(n) >= 1e9) return (n/1e9).toFixed(2)+"b";
  if(Math.abs(n) >= 1e6) return (n/1e6).toFixed(2)+"m";
  if(Math.abs(n) >= 1e3) return (n/1e3).toFixed(1)+"k";
  return n.toLocaleString();
}

function hitTag(hit){
  if(hit.blocked) return "BLOCK";
  if(hit.crit) return "치명";
  return "일반";
}
function hitEventEl(hit, action, i, totalHits, heal, firstMark){
  const isDbl = !!hit.double;
  const idx = totalHits > 1 ? (isDbl ? "[더블]" : "[1타]") : "";
  const tag = hitTag(hit);
  const dmg = fmtN(hit.dmg);
  let cls = "log-evt";
  if(hit.blocked) cls += " block";
  else if(hit.crit) cls += " crit";
  if(action.startsWith("스킬")) cls += " skill";
  const mark = (i===0 && firstMark) ? " ★" : "";
  const healStr = (i===0 && heal>0 && !hit.blocked && action==="일반공격") ? ` +${fmtN(heal)}흡` : "";
  return h("div",{class:cls}, `${action}${idx} ${tag} ${dmg}${healStr}${mark}`);
}

function renderSideEvents(e, side, firsts){
  const container = h("div",{class:"log-side"+(side==="en"?" en":"")});
  const hp = side==="me" ? e.myHp : e.enHp;
  const hpMax = side==="me" ? (e.myMaxSnap||e.myHp) : (e.enMaxSnap||e.enHp);
  const ratio = Math.max(0, Math.min(1, hp/Math.max(1,hpMax)));
  const barWrap = h("div",{class:"hpbar"});
  barWrap.append(h("div",{class:"hpfill "+side, style:`width:${(ratio*100).toFixed(1)}%`}));
  container.append(barWrap);
  container.append(h("div",{class:"hplabel"}, `${side==="me"?"나":"적"} ${fmtN(hp)} / ${fmtN(hpMax)}`));

  // 이벤트들
  if(side==="me"){
    if(e.myBuffStarted) container.append(h("div",{class:"log-evt buff"}, "★ 버프스킬 발동 (8초)"));
    if(e.myBuffEnded) container.append(h("div",{class:"log-evt buff"}, "☆ 버프스킬 종료"));
    if(e.myAuto>0) (e.myAutoHits||[]).forEach((hit,i,arr)=>container.append(hitEventEl(hit,"일반공격",i,arr.length,e.myHeal,false)));
    if(e.myS1>0){ (e.myS1Hits||[]).forEach((hit,i,arr)=>container.append(hitEventEl(hit,"스킬1",i,arr.length,0,firsts.s1&&i===0))); if(firsts.s1) firsts.s1=false; }
    if(e.myS2>0){ (e.myS2Hits||[]).forEach((hit,i,arr)=>container.append(hitEventEl(hit,"스킬2",i,arr.length,0,firsts.s2&&i===0))); if(firsts.s2) firsts.s2=false; }
  } else {
    if(e.enBuffStarted) container.append(h("div",{class:"log-evt buff"}, "★ 버프스킬 발동 (8초)"));
    if(e.enBuffEnded) container.append(h("div",{class:"log-evt buff"}, "☆ 버프스킬 종료"));
    if(e.enAuto>0) (e.enAutoHits||[]).forEach((hit,i,arr)=>container.append(hitEventEl(hit,"일반공격",i,arr.length,e.enHeal,false)));
    if(e.enS1>0){ (e.enS1Hits||[]).forEach((hit,i,arr)=>container.append(hitEventEl(hit,"스킬1",i,arr.length,0,firsts.es1&&i===0))); if(firsts.es1) firsts.es1=false; }
    if(e.enS2>0){ (e.enS2Hits||[]).forEach((hit,i,arr)=>container.append(hitEventEl(hit,"스킬2",i,arr.length,0,firsts.es2&&i===0))); if(firsts.es2) firsts.es2=false; }
  }
  return container;
}

function renderCombatLog(sim, labelMe, labelEn){
  if(!sim.log || sim.log.length === 0) return null;
  // 각 tick의 myMaxTick/enMaxTick 사용 (버프 발동 시 max 변화 반영)
  sim.log.forEach(e => {
    e.myMaxSnap = e.myMaxTick || sim.myMax;
    e.enMaxSnap = e.enMaxTick || sim.enMax;
  });

  const det = h("details",{style:"margin-top:10px;background:var(--panel2)"});
  det.append(h("summary",{style:"padding:10px 12px;font-size:13px;color:var(--muted)"},
    `📜 전투 로그 (${sim.log.length}개 tick, 총 ${sim.t.toFixed(1)}초)`));
  const wrap = h("div",{style:"max-height:480px;overflow:auto;border-top:1px solid var(--border);background:#0c0e13"});
  const firsts = { s1:true, s2:true, es1:true, es2:true };
  for(const e of sim.log){
    const tick = h("div",{class:"log-tick"});
    tick.append(h("div",{class:"log-time"}, `[${e.t.toFixed(1)}s]`));
    const sides = h("div",{class:"log-sides"});
    sides.append(renderSideEvents(e, "me", firsts));
    sides.append(renderSideEvents(e, "en", firsts));
    tick.append(sides);
    wrap.append(tick);
  }
  det.append(wrap);
  return det;
}

let _recBusy = false;
async function runRecommend(btn){
  if(_recBusy) return;
  _recBusy = true;
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = "계산 중…";
  // 한 프레임 yield 후 실행 (UI가 텍스트 업데이트 반영하도록)
  await new Promise(r => setTimeout(r, 30));
  try {
    const cur = currentCPScore(state);
    let bestGain = -Infinity, target = null;
    const iter = [
      ...state.equips.map((s,i)=>({kind:"equips",idx:i})),
      ...state.pets.map((s,i)=>({kind:"pets",idx:i})),
      { kind:"mount", idx:0 }
    ];
    const usedCands = OPT.filter(o=>o.used && o.id!=="none");
    const totalSlots = iter.reduce((n,l)=> n + (l.kind==="mount" ? state.mount.opts.length : 2), 0);
    let slotDone = 0;

    for(const loc of iter){
      const slot = loc.kind==="mount" ? state.mount : state[loc.kind][loc.idx];
      for(let k=0; k<slot.opts.length; k++){
        const opt = slot.opts[k];
        const saveType = opt.type, saveVal = opt.val;
        let slotBest = -Infinity;
        try {
          for(const cand of usedCands){
            if(cand.id === saveType && cand.max === saveVal) continue;
            opt.type = cand.id; opt.val = cand.max;
            const s = currentCPScore(state);
            if(s > slotBest) slotBest = s;
          }
        } finally { opt.type = saveType; opt.val = saveVal; }
        const gain = slotBest - cur;
        if(gain > bestGain){
          bestGain = gain;
          target = { kind:loc.kind, idx:loc.idx, optIdx:k, current:{type:saveType,val:saveVal}, slotBest };
        }
        slotDone++;
        btn.textContent = `탐색 중 ${slotDone}/${totalSlots}`;
        await new Promise(r => setTimeout(r, 0)); // UI yield
      }
    }

    if(!target){
      const host = document.getElementById("rec-body");
      host.innerHTML = "";
      host.append(h("p",null,"슬롯 정보가 부족합니다."));
      return;
    }

    const locLabel = (() => {
      if(target.kind === "equips") return `장비 #${target.idx+1} / 옵션${target.optIdx+1}`;
      if(target.kind === "pets")   return `펫 #${target.idx+1} / 옵션${target.optIdx+1}`;
      return `탈것 / 옵션${target.optIdx+1}`;
    })();
    const curOpt = target.current;
    const curOptDef = OPT.find(o=>o.id===curOpt.type);
    const curOptLabel = curOpt.type==="none" ? "비어있음" : `${curOptDef?.name||curOpt.type} ${curOpt.val}%`;

    // 최적 슬롯 13종 랭킹
    btn.textContent = "랭킹 산출 중…";
    await new Promise(r => setTimeout(r, 0));
    const out = [];
    const curSlot = target.kind==="mount" ? state.mount : state[target.kind][target.idx];
    const optToChange = curSlot.opts[target.optIdx];
    const saveType2 = optToChange.type, saveVal2 = optToChange.val;
    try {
      for(const cand of usedCands){
        if(cand.id === target.current.type && cand.max === target.current.val) continue;
        optToChange.type = cand.id; optToChange.val = cand.max;
        const s = currentCPScore(state);
        out.push({ id:cand.id, name:cand.name, val:cand.max, score:s, gain:s-cur });
        await new Promise(r => setTimeout(r, 0));
      }
    } finally { optToChange.type = saveType2; optToChange.val = saveVal2; }
    out.sort((a,b)=>b.gain-a.gain);

    const host = document.getElementById("rec-body");
    host.innerHTML = "";
    host.append(h("div",{class:"slot"}, h("h4",null,"교체 가치가 가장 큰 슬롯"),
      kv("슬롯", locLabel), kv("현재 옵션", curOptLabel),
      kv("현재 점수", cur.toFixed(0))
    ));

    const table = h("table", null,
      h("thead",null, h("tr",null, h("th",null,"옵션"), h("th",null,"수치"), h("th",{class:"num"},"점수 변화"), h("th",{class:"num"},"최종 점수"))),
      h("tbody",null)
    );
    const tbody = table.querySelector("tbody");
    const denom = Math.max(1, Math.abs(cur));
    for(const r of out){
      const pct = (r.gain / denom) * 100;
      tbody.append(h("tr",null,
        h("td",null,r.name), h("td",null,`${r.val}%`),
        h("td",{class:"num "+(r.gain>=0?"pos":"neg")}, `${r.gain>=0?"+":""}${pct.toFixed(2)}%`),
        h("td",{class:"num"}, r.score.toFixed(0))
      ));
    }
    host.append(h("div",{class:"slot"}, h("h4",null,"이 슬롯을 13종 최대치로 바꿔본 결과"), table));
    host.append(h("div",{class:"btnrow"},
      h("button",{class:"btn alt", onclick:function(){ runRecommend(this); }}, "🔄 다시 계산")
    ));
  } catch(e){
    alert("계산 실패: " + e.message);
    btn.textContent = origText;
    btn.disabled = false;
  } finally {
    _recBusy = false;
  }
}

/* ==========================================================================
   대장간 로직 & 렌더링
   ========================================================================== */
function forgeIncomePerSec(f){
  const moneyRateBonus = 1 + (f.research.moneyRate||0)/100;
  const hammerRateBonus = 1 + (f.research.hammerRate||0)/100;
  return {
    moneyPerSec: INCOME_MONEY_PER_SEC * moneyRateBonus,
    hammerPerSec: (INCOME_HAMMER_PER_MIN/60) * hammerRateBonus,
    moneyEquivPerSec: (INCOME_MONEY_PER_SEC * moneyRateBonus) + ((INCOME_HAMMER_PER_MIN/60) * hammerRateBonus) * HAMMER_TO_MONEY
  };
}
function forgeUpgradeInfo(f){
  const i = Math.max(0, Math.min(FORGE_DEFAULT_TABLE.length-1, (f.level||1)-1));
  const row = f.table[i] || FORGE_DEFAULT_TABLE[i];
  const saveChance = Math.max(0, Math.min(100, +f.hammerSaveChance||0))/100;
  return {
    level: f.level,
    effCost: Math.max(0, Math.round(row.cost * (1 - (f.research.cost||0)/100) * (1 - saveChance))),
    effTime: Math.max(0, Math.round(row.time / (1 + ((f.research.time||0)*2)/100)))
  };
}
function calcClanReward(clan){
  let hammer = 0, money = 0;
  for(const m of FORGE_PERSONAL_MILESTONES){
    if((+clan.personalScore||0) >= m.score){
      hammer += m.hammer||0;
      money += m.money||0;
    }
  }
  const tier = FORGE_TIER_REWARDS[clan.tier] || FORGE_TIER_REWARDS.B;
  hammer += clan.win ? tier.hammerWin : tier.hammerLose;
  money  += clan.win ? tier.moneyWin  : tier.moneyLose;
  return { hammer, money, moneyEquiv: money + hammer * HAMMER_TO_MONEY };
}
function nextMondayAt8(fromDate){
  const d = new Date(fromDate);
  for(let i=0; i<=7; i++){
    const t = new Date(d); t.setDate(d.getDate()+i); t.setHours(8,0,0,0);
    if(t > d && t.getDay() === 1) return t;
  }
  return null;
}
function formatDuration(sec){
  sec = Math.max(0, Math.round(sec));
  const d = Math.floor(sec/86400); sec -= d*86400;
  const h = Math.floor(sec/3600);  sec -= h*3600;
  const m = Math.floor(sec/60);    sec -= m*60;
  const parts = [];
  if(d) parts.push(d+"일"); if(h || d) parts.push(h+"시간"); if(m || h || d) parts.push(m+"분"); parts.push(sec+"초");
  return parts.join(" ");
}
function formatKRW(n){ return Math.round(n).toLocaleString()+"원"; }
function formatDateTime(d){ const p = x => String(x).padStart(2,"0"); return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())} ${p(d.getHours())}:${p(d.getMinutes())}`; }

function forgeTimeToUpgrade(state){
  const f = state.forge;
  const up = forgeUpgradeInfo(f);
  const inc = forgeIncomePerSec(f);
  const now = new Date();
  const asset = (+f.money||0) + (+f.hammers||0) * HAMMER_TO_MONEY;
  const need = up.effCost;
  const monday = nextMondayAt8(now);
  const untilMondaySec = monday ? (monday - now)/1000 : Infinity;
  const clanReward = (!f.clan.claimed) ? calcClanReward(f.clan).moneyEquiv : 0;

  let costTimeSec;
  if(asset >= need) costTimeSec = 0;
  else {
    const tByInc = (need - asset) / Math.max(1e-9, inc.moneyEquivPerSec);
    if(tByInc <= untilMondaySec) costTimeSec = tByInc;
    else {
      const assetAtMonday = asset + inc.moneyEquivPerSec * untilMondaySec + clanReward;
      if(assetAtMonday >= need) costTimeSec = untilMondaySec;
      else costTimeSec = untilMondaySec + (need - assetAtMonday) / Math.max(1e-9, inc.moneyEquivPerSec);
    }
  }
  const totalSec = costTimeSec + up.effTime;
  return { asset, need, costTimeSec, upgradeSec: up.effTime, totalSec, doneAt: new Date(now.getTime() + totalSec*1000) };
}

// 현재 레벨부터 테이블 끝까지 누적 타임라인 계산
function forgeTimelineAll(state){
  const f = state.forge;
  const inc = forgeIncomePerSec(f);
  const nowDate = new Date();
  const monday = nextMondayAt8(nowDate);
  const mondaySec = monday ? (monday - nowDate)/1000 : Infinity;
  const clanReward = (!f.clan.claimed) ? calcClanReward(f.clan).moneyEquiv : 0;

  let asset = (+f.money||0) + (+f.hammers||0) * HAMMER_TO_MONEY;
  let elapsed = 0;
  let clanApplied = !!f.clan.claimed;

  const rows = [];
  const upgrading = f.upgrading || {};
  const startIdx = (f.level||1) - 1;
  const saveChance = Math.max(0, Math.min(100, +f.hammerSaveChance||0))/100;
  for(let i = startIdx; i < f.table.length; i++){
    const tableRow = f.table[i] || FORGE_DEFAULT_TABLE[i];
    let effCost = Math.max(0, Math.round(tableRow.cost * (1 - (f.research.cost||0)/100) * (1 - saveChance)));
    let effTime = Math.max(0, Math.round(tableRow.time / (1 + ((f.research.time||0)*2)/100)));
    // 첫 레벨이 "강화 중"이면 비용은 이미 지불됐고 남은 시간만 소요
    if(i === startIdx && upgrading.active){
      effCost = 0;
      effTime = Math.max(0, Math.round(+upgrading.remainingSec||0));
    }

    let costTime = 0;
    let clanAppliedThisRow = false;
    if(asset >= effCost){
      asset -= effCost;
    } else {
      if(!clanApplied){
        const untilM = Math.max(0, mondaySec - elapsed);
        const tToFull = (effCost - asset) / Math.max(1e-9, inc.moneyEquivPerSec);
        if(tToFull <= untilM){
          costTime = tToFull; asset = 0;
        } else {
          const assetAtMonday = asset + inc.moneyEquivPerSec * untilM + clanReward;
          if(assetAtMonday >= effCost){
            costTime = untilM;
            asset = assetAtMonday - effCost;
          } else {
            costTime = untilM + (effCost - assetAtMonday) / Math.max(1e-9, inc.moneyEquivPerSec);
            asset = 0;
          }
          clanApplied = true; clanAppliedThisRow = true;
        }
      } else {
        costTime = (effCost - asset) / Math.max(1e-9, inc.moneyEquivPerSec);
        asset = 0;
      }
    }
    // 업그레이드 소요 시간 동안도 자원 수급
    const upgradeAdd = inc.moneyEquivPerSec * effTime;
    asset += upgradeAdd;
    const rowEnd = elapsed + costTime + effTime;
    if(!clanApplied && rowEnd > mondaySec){
      asset += clanReward; clanApplied = true; clanAppliedThisRow = true;
    }
    rows.push({
      from: i+1, to: i+2,
      effCost, effTime, costTime,
      cumSec: rowEnd, clanAppliedThisRow,
      doneAt: new Date(nowDate.getTime() + rowEnd*1000)
    });
    elapsed = rowEnd;
    if(rows.length >= 20) break; // 최대 20레벨까지만
  }
  return { rows, inc };
}

function renderForgeMe(){
  const host = document.getElementById("forge-me-body");
  if(!host) return;
  host.innerHTML = "";
  const f = state.forge;
  if(!f.upgrading) f.upgrading = { active:false, remainingSec:0 };

  host.append(h("div",{class:"slot"},
    h("h4",null,"보유 자원"),

      h("div",null,h("label",null,"현재 돈 (원)"), unitNumInput(f.money, v=>{f.money=v;onAnyChange();})),
      h("div",null,h("label",null,"현재 망치 수"), unitNumInput(f.hammers, v=>{f.hammers=v;onAnyChange();})),
      h("div",null,h("label",null,"대장간 레벨"), numInput(f.level, v=>{f.level=Math.max(1,Math.round(v));onAnyChange();})),
      h("div",null,h("label",null,"오늘 던전 획득 망치"), numInput(f.todayDungeonHammers, v=>{f.todayDungeonHammers=v;onAnyChange();}))
    )
  ));

  // 강화 중 상태
  const upChk = h("input",{type:"checkbox", id:"forge-upgrading-chk", style:"width:auto;min-height:auto;margin-right:6px",
    onchange:(e)=>{ f.upgrading.active = e.target.checked; onAnyChange(); renderForgeMe(); }});
  if(f.upgrading.active) upChk.checked = true;

  const upBox = h("div",{class:"slot"});
  upBox.append(h("h4",null,"⚙️ 강화 진행 상태"));
  upBox.append(h("label",{for:"forge-upgrading-chk", style:"display:flex;align-items:center;margin:4px 0 8px;cursor:pointer"},
    upChk, h("span",null, `${f.level} → ${f.level+1} 강화 중 (체크 시 남은 시간 입력)`)
  ));

  if(f.upgrading.active){
    // 분/초 입력
    let rem = +f.upgrading.remainingSec || 0;
    const days = Math.floor(rem/86400); rem -= days*86400;
    const hours = Math.floor(rem/3600); rem -= hours*3600;
    const mins = Math.floor(rem/60);
    const secs = rem - mins*60;
    const daysInp = numInput(days, v=>{
      const cur = parseRemaining();
      f.upgrading.remainingSec = (+v||0)*86400 + cur.h*3600 + cur.m*60 + cur.s;
      onAnyChange();
    });
    const hoursInp = numInput(hours, v=>{
      const cur = parseRemaining();
      f.upgrading.remainingSec = cur.d*86400 + (+v||0)*3600 + cur.m*60 + cur.s;
      onAnyChange();
    });
    const minsInp = numInput(mins, v=>{
      const cur = parseRemaining();
      f.upgrading.remainingSec = cur.d*86400 + cur.h*3600 + (+v||0)*60 + cur.s;
      onAnyChange();
    });
    const secsInp = numInput(secs, v=>{
      const cur = parseRemaining();
      f.upgrading.remainingSec = cur.d*86400 + cur.h*3600 + cur.m*60 + (+v||0);
      onAnyChange();
    });
    function parseRemaining(){
      const total = +f.upgrading.remainingSec||0;
      const d = Math.floor(total/86400);
      const h = Math.floor((total-d*86400)/3600);
      const m = Math.floor((total-d*86400-h*3600)/60);
      const s = total - d*86400 - h*3600 - m*60;
      return { d, h, m, s };
    }
    upBox.append(h("div",{class:"row"},
      h("div",null, h("label",null,"남은 일"), daysInp),
      h("div",null, h("label",null,"시간"), hoursInp),
      h("div",null, h("label",null,"분"), minsInp),
      h("div",null, h("label",null,"초"), secsInp)
    ));
    upBox.append(h("p",{class:"muted",style:"margin:6px 0 0"},
      `현재 남은 시간: ${formatDuration(+f.upgrading.remainingSec||0)} → 타임라인에 반영됨 (비용은 이미 지불된 것으로 계산)`
    ));
  }
  host.append(upBox);
}

function stoneProbUp(step){ const n = step.upPass + step.downFail + step.downPass + step.upFail; return (step.upPass + step.downFail + 1) / (n + 2); }
function stonesPickChoice(idx, ch){ state.stones.current.choices[idx]=ch; state.stones.current.step=idx; onAnyChange(); }
function stonesResolve(pass){
  const cur = state.stones.current, idx = cur.step, ch = cur.choices[idx];
  if(!ch){ alert("먼저 위/아래를 선택하세요."); return; }
  const s = state.stones.steps[idx];
  if(ch==="up") pass ? s.upPass++ : s.upFail++; else pass ? s.downPass++ : s.downFail++;
  if(pass){
    if(idx===7){ state.stones.history.unshift({ choices: cur.choices.slice(), failedAt: null, success: true }); state.stones.current = { step:0, choices:[] }; alert("🎉 8단계 통과 성공!"); }
    else cur.step = idx + 1;
  } else { state.stones.history.unshift({ choices: cur.choices.slice(0, idx+1), failedAt: idx, success:false }); state.stones.current = { step:0, choices:[] }; }
  saveState(); render();
}
function stonesReset(){ if(confirm("초기화?")){ state.stones.current = { step:0, choices:[] }; saveState(); render(); } }
function stonesResetAll(){ if(confirm("통계 초기화?")){ state.stones = defaultState().stones; saveState(); render(); } }

  const host = document.getElementById("stones-play-body");
  if(!host) return;
  host.innerHTML = "";
  const cur = state.stones.current, step = cur.step, pUp = stoneProbUp(state.stones.steps[step]);
  host.append(h("div",{class:"big"}, `${step+1} / 8 단계`), h("div",{class:"slot"}, h("h4",null,"확률"), kv("▲ 위 정답 확률", `${(pUp*100).toFixed(1)}%`), kv("▼ 아래 정답 확률", `${((1-pUp)*100).toFixed(1)}%`)));
  host.append(h("div",{class:"btnrow"}, h("button",{class:"btn"+(cur.choices[step]==="up"?"":" alt"), style:"flex:1", onclick:()=>stonesPickChoice(step, "up")}, "▲ 위"), h("button",{class:"btn"+(cur.choices[step]==="down"?"":" alt"), style:"flex:1", onclick:()=>stonesPickChoice(step, "down")}, "▼ 아래")));
  host.append(h("div",{class:"btnrow", style:"margin-top:6px"}, h("button",{class:"btn", style:"flex:1", onclick:()=>stonesResolve(true)}, "✔ 통과"), h("button",{class:"btn warn", style:"flex:1", onclick:()=>stonesResolve(false)}, "✘ 실패")));
  host.append(h("div",{class:"btnrow", style:"margin-top:10px"}, h("button",{class:"btn alt", onclick:stonesReset}, "진행중 시도 초기화")));
}
