<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>전투력 · 대장간 계산기</title>
<style>
  :root{
    --bg:#0f1115; --panel:#171a21; --panel2:#1f232c; --border:#2a2f3a;
    --text:#e8ecf1; --muted:#9aa3b2; --accent:#4cc2ff; --good:#6ee7b7; --bad:#f87171; --warn:#fbbf24;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font:15px/1.45 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans KR",sans-serif}
  .wrap{max-width:640px;margin:0 auto;padding:12px 10px 120px}
  h1{font-size:20px;margin:6px 4px 4px}
  .sub{color:var(--muted);font-size:12px;margin:0 4px 10px}
  details{background:var(--panel);border:1px solid var(--border);border-radius:12px;margin:10px 0;overflow:hidden}
  details>summary{cursor:pointer;padding:12px 14px;font-weight:600;font-size:15px;list-style:none;display:flex;justify-content:space-between;align-items:center}
  details>summary::-webkit-details-marker{display:none}
  details>summary::after{content:"▾";color:var(--muted);transition:transform .15s}
  details[open]>summary::after{transform:rotate(180deg)}
  .body{padding:6px 12px 14px;border-top:1px solid var(--border)}
  .slot{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:10px;margin:8px 0}
  .slot h4{margin:0 0 8px;font-size:13px;color:var(--muted);font-weight:600;letter-spacing:.03em}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
  .row3{display:grid;grid-template-columns:1.2fr 1fr .8fr;gap:6px;align-items:end}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:3px}
  input,select{width:100%;background:#0c0e13;color:var(--text);border:1px solid var(--border);border-radius:8px;padding:10px;font-size:15px;min-height:44px}
  input[type=number]{-moz-appearance:textfield}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
  input:focus,select:focus{outline:2px solid var(--accent);outline-offset:0}
  input.over{border-color:var(--bad)}
  .btn{display:inline-block;background:var(--accent);color:#00233a;border:0;border-radius:10px;padding:12px 14px;font-weight:700;font-size:15px;min-height:44px;cursor:pointer}
  .btn.alt{background:#2a2f3a;color:var(--text)}
  .btn.warn{background:#3a1f1f;color:#ffb7b7}
  .btnrow{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  .kv{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px dashed var(--border);font-size:14px}
  .kv:last-child{border-bottom:0}
  .kv b{color:var(--text)}
  .kv span{color:var(--muted)}
  .big{font-size:36px;font-weight:800;text-align:center;margin:8px 0}
  .big.good{color:var(--good)}.big.bad{color:var(--bad)}
  .lbl-sub{font-size:12px;color:var(--muted);text-align:center;margin-bottom:10px}
  table{width:100%;border-collapse:collapse;font-size:14px}
  th,td{text-align:left;padding:8px 6px;border-bottom:1px solid var(--border)}
  th{color:var(--muted);font-weight:600;font-size:12px}
  td.num{text-align:right;font-variant-numeric:tabular-nums}
  .pos{color:var(--good)}.neg{color:var(--bad)}
  .notice{background:#1a1f14;border:1px solid #3e4a22;color:#d8e8b4;padding:8px 10px;border-radius:8px;font-size:12px;margin:8px 0}
  .fab{position:fixed;bottom:calc(12px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
  .fab .btn{box-shadow:0 6px 20px rgba(0,0,0,.4)}
  .hidden{display:none}
  .tabs{display:flex;gap:6px;margin:10px 0;position:sticky;top:0;background:var(--bg);padding:8px 0;z-index:5}
  .tab{flex:1;padding:12px 8px;border:1px solid var(--border);border-radius:10px;background:var(--panel);color:var(--muted);font-weight:700;font-size:14px;text-align:center;cursor:pointer;user-select:none}
  .tab.active{background:var(--accent);color:#00233a;border-color:var(--accent)}
  .tab-panel{display:none}
  .tab-panel.active{display:block}
  .muted{color:var(--muted);font-size:12px}
  input[type=range]{width:100%;accent-color:var(--accent);min-height:30px}
  .range-row{display:grid;grid-template-columns:auto 1fr auto;gap:8px;align-items:center}
  .range-row b{min-width:44px;text-align:right;font-variant-numeric:tabular-nums}
  .gear-sec-title{font-size:11px;color:var(--muted);margin:10px 2px 4px;letter-spacing:.05em;text-transform:uppercase;font-weight:700}
  .gear-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
  .gear-grid.pets{grid-template-columns:repeat(3,1fr)}
  .gear-grid.mount{grid-template-columns:1fr}
  .gear-card{background:var(--panel2);border:1px solid var(--border);border-radius:10px;padding:8px 6px;cursor:pointer;position:relative;min-height:96px;display:flex;flex-direction:column;user-select:none;transition:border-color .1s,background .1s}
  .gear-card.active{border-color:var(--accent);background:#102734;box-shadow:0 0 0 2px rgba(76,194,255,.3) inset}
  .gear-card.has-opts{background:#1a2230}
  .gear-card .icon{font-size:26px;text-align:center;line-height:1;margin-top:2px}
  .gear-card .title{font-size:10px;color:var(--muted);text-align:center;margin-top:3px;font-weight:600}
  .gear-card .opts{font-size:10px;color:var(--text);margin-top:6px;line-height:1.35;flex:1;display:flex;flex-direction:column;justify-content:center;align-items:center;gap:2px}
  .gear-card .opt-chip{background:#0c1118;border:1px solid var(--border);border-radius:6px;padding:2px 5px;font-size:10px;color:var(--good);font-weight:600;white-space:nowrap}
  .gear-card .opt-chip.empty{color:var(--muted);background:transparent;border-style:dashed}
  .gear-card .basestat{font-size:9px;color:var(--muted);text-align:center;margin-top:3px;font-variant-numeric:tabular-nums}
  @media (min-width:600px){.row{grid-template-columns:1fr 1fr 1fr 1fr}}
</style>
</head>
<body>
<div class="wrap">
  <h1>전투력 · 대장간 계산기</h1>
  <div class="notice">⚠️ iOS Safari는 일주일 이상 안 열면 저장값을 자동 삭제할 수 있어요. 가끔 JSON 내보내기로 백업해 두세요.</div>

  <div class="tabs">
    <div class="tab active" data-tab="combat">⚔️ 전투력</div>
    <div class="tab" data-tab="forge">🔨 대장간</div>
    <div class="tab" data-tab="stones">🪜 디딤돌</div>
  </div>

  <div class="tab-panel active" id="panel-combat">
    <details open id="sec-me"><summary>① 내 장비/펫/탈것</summary><div class="body" id="me-body"></div></details>
    <details id="sec-buff"><summary>② 버프스킬 · 딜스킬 · 연구</summary><div class="body" id="buff-body"></div></details>
    <details id="sec-enemy"><summary>③ 상대 스펙</summary><div class="body" id="enemy-body"></div></details>
    <details open id="sec-result"><summary>④ 결과 (전투력 & 시뮬레이션)</summary><div class="body" id="result-body"></div></details>
    <details id="sec-recommend"><summary>⑤ 최대 효율 옵션 추천</summary><div class="body" id="rec-body"></div></details>
    <details id="sec-compare"><summary>⑥ 옵션 교체 비교</summary><div class="body" id="cmp-body"></div></details>
  </div>

  <div class="tab-panel" id="panel-forge">
    <details open id="sec-forge-me"><summary>① 내 자원</summary><div class="body" id="forge-me-body"></div></details>
    <details id="sec-forge-research"><summary>② 기술연구</summary><div class="body" id="forge-research-body"></div></details>
    <details id="sec-forge-clan"><summary>③ 클랜전 보상</summary><div class="body" id="forge-clan-body"></div></details>
    <details id="sec-forge-table"><summary>④ 대장간 레벨 테이블</summary><div class="body" id="forge-table-body"></div></details>
    <details open id="sec-forge-result"><summary>⑤ 다음 업그레이드</summary><div class="body" id="forge-result-body"></div></details>
  </div>

  <div class="tab-panel" id="panel-stones">
    <details open id="sec-stones-play"><summary>① 현재 시도</summary><div class="body" id="stones-play-body"></div></details>
    <details open id="sec-stones-stat"><summary>② 단계별 통계 & 추천</summary><div class="body" id="stones-stat-body"></div></details>
    <details id="sec-stones-history"><summary>③ 시도 기록</summary><div class="body" id="stones-history-body"></div></details>
  </div>

  <details id="sec-save"><summary>💾 저장 / 불러오기</summary><div class="body" id="save-body"></div></details>
</div>

<div class="fab">
  <button class="btn" id="btn-recalc">다시 계산</button>
  <button class="btn alt" id="btn-top">맨 위</button>
</div>

<script>
"use strict";

/* ==========================================================================
   옵션 정의
   ========================================================================== */
const OPT = [
  { id:"none",     name:"— 없음 —", max:0,   used:true },
  { id:"critRate", name:"치명타 확률",    max:12,  used:true },
  { id:"critDmg",  name:"치명타 피해",    max:100, used:true },
  { id:"block",    name:"블록 확률",      max:5,   used:true },
  { id:"hpRegen",  name:"체력 재생",      max:6,   used:false }, // 전투력 0
  { id:"hp",       name:"체력",           max:15,  used:true },
  { id:"lifesteal",name:"생명력 흡수",    max:20,  used:true },
  { id:"double",   name:"더블 찬스",      max:40,  used:true },
  { id:"dmg",      name:"피해",           max:15,  used:true },
  { id:"melee",    name:"근접 피해",      max:50,  used:false }, // 미사용
  { id:"ranged",   name:"원거리 피해",    max:15,  used:true },
  { id:"atkSpd",   name:"공격 속도",      max:40,  used:true },
  { id:"skillDmg", name:"스킬 피해",      max:30,  used:true },
  { id:"skillCd",  name:"스킬 쿨감(−)",   max:-7,  used:true },
];
const OPT_USED = OPT.filter(o => o.used && o.id !== "none");
const OPT_IDS_ENEMY = OPT.filter(o => o.id !== "none").map(o => o.id); // 상대는 13종 전부 입력(단순화)

/* ==========================================================================
   대장간 데이터
   ========================================================================== */
// 개인 클랜전 마일스톤(누적 점수 도달 시 해당 구간 보상 지급, 망치 기준)
const FORGE_PERSONAL_MILESTONES = [
  { score:10000,  hammer:100 },
  { score:50000,  hammer:140 },
  { score:100000, hammer:200 },
  { score:200000, hammer:280 },
  { score:300000, hammer:380 },
  { score:400000, hammer:550 },
  { score:500000, hammer:750 },
];
// 단체 보상(티어별 승/패 망치)
const FORGE_TIER_REWARDS = {
  S: { win:8400, lose:4200 },
  A: { win:5900, lose:3000 },
  B: { win:4000, lose:2000 },
  C: { win:2900, lose:1400 },
  D: { win:2000, lose:1000 },
  E: { win:1400, lose: 700 },
};
// 대장간 업그레이드 테이블 — [레벨 N→N+1]의 비용(원), 시간(초)
// 사진 기반 추정값. UI에서 수정 가능.
const FORGE_DEFAULT_TABLE = [
  // N→N+1  cost      time(초)
  { cost:400,       time:300      }, // 1→2 (5분)
  { cost:800,       time:2400     }, // 2→3 (40분)
  { cost:1300,      time:3600     }, // 3→4 (1시간)
  { cost:3600,      time:6000     }, // 4→5 (1시간40분)
  { cost:10000,     time:12000    }, // 5→6 (3시간20분)
  { cost:30000,     time:36000    }, // 6→7 (10시간)
  { cost:50000,     time:54000    }, // 7→8 (15시간)
  { cost:100000,    time:67200    }, // 8→9 (18시간40분)
  { cost:200000,    time:82800    }, // 9→10 (23시간)
  { cost:350000,    time:127200   }, // 10→11 (1d 11h 20m)
  { cost:500000,    time:167400   }, // 11→12 (1d 19h 30m)
  { cost:910000,    time:207000   }, // 12→13 (2d 9h 30m)
  { cost:1000000,   time:207000   }, // 13→14
  { cost:1200000,   time:277200   }, // 14→15 (3d 5h)
  { cost:1600000,   time:277200   }, // 15→16
  { cost:1900000,   time:367200   }, // 16→17 (4d 6h)
  { cost:2300000,   time:457200   }, // 17→18 (5d 7h)
  { cost:2700000,   time:457200   }, // 18→19
  { cost:3500000,   time:547200   }, // 19→20
  { cost:4200000,   time:547200   }, // 20→21
  { cost:5000000,   time:637200   }, // 21→22
  { cost:6000000,   time:637200   }, // 22→23
  { cost:7500000,   time:727200   }, // 23→24
  { cost:9000000,   time:727200   }, // 24→25
  { cost:11000000,  time:752200   }, // 25→26
  { cost:13000000,  time:752200   }, // 26→27
  { cost:15000000,  time:752200   }, // 27→28
  { cost:17000000,  time:752200   }, // 28→29
  { cost:19000000,  time:752200   }, // 29→30
  { cost:20000000,  time:752200   }, // 30→31
  { cost:20200000,  time:752200   }, // 31→32
  { cost:20500000,  time:752200   }, // 32→33
];
const HAMMER_TO_MONEY = 63;
const INCOME_MONEY_PER_SEC = 1;     // 기본 돈 수급 1/초
const INCOME_HAMMER_PER_MIN = 1;    // 기본 망치 수급 1/분

/* ==========================================================================
   기본 상태
   ========================================================================== */
function emptyOpt(){ return { type:"none", val:0 }; }
function emptySlot(opts){ return { hp:0, atk:0, opts: Array.from({length:opts}, emptyOpt) }; }
function defaultState(){
  return {
    equips: Array.from({length:8}, () => emptySlot(2)),
    pets:   Array.from({length:3}, () => emptySlot(2)),
    mount:  emptySlot(1), // 탈것 옵션 1개
    buff:   { hpFlat:0, atkFlat:0 },
    skills: [ { coef:0, cd:0 }, { coef:0, cd:0 } ],
    research: { skillDmg:0, equipAtk:0, equipHp:0, petAtk:0, petHp:0, mountAtk:0, mountHp:0 },
    enemy: {
      hp:0, atk:0,
      opts: Object.fromEntries(OPT_IDS_ENEMY.map(k => [k,0])),
      skills: [ { coef:0, cd:0 }, { coef:0, cd:0 } ],
    },
    cmp: { slot:"equips-0-0", to:{type:"none",val:0} },
    forge: {
      money: 0,
      hammers: 0,
      level: 1,
      todayDungeonHammers: 0,       // 오늘 망치던전에서 받은 망치 총합
      research: { rate:0, cost:0, time:0 }, // 0~25 단계
      clan: { personalScore:0, tier:"B", win:true, claimed:false },
      table: FORGE_DEFAULT_TABLE.map(r => ({ cost:r.cost, time:r.time })),
    },
    stones: {
      steps: Array.from({length:8}, () => ({ upPass:0, upFail:0, downPass:0, downFail:0 })),
      history: [],                              // [{choices:["up","down",...], failedAt:N|null, success:bool}]
      current: { step:0, choices:[] },          // 진행 중 시도
    },
    _activeTab: "combat",
  };
}

const LS_KEY = "combatCalcState";
let state = loadState() || defaultState();

function loadState(){
  try {
    const raw = localStorage.getItem(LS_KEY);
    if(!raw) return null;
    const parsed = JSON.parse(raw);
    return migrate(parsed);
  } catch(e){ return null; }
}
function migrate(s){
  const d = defaultState();
  if(!Array.isArray(s.equips) || s.equips.length!==8) s.equips = d.equips;
  if(!Array.isArray(s.pets)   || s.pets.length!==3)   s.pets   = d.pets;
  if(!s.mount || !Array.isArray(s.mount.opts)) s.mount = d.mount;
  else s.mount.opts = s.mount.opts.slice(0,1).concat(s.mount.opts.length===0?[emptyOpt()]:[]); // 탈것은 항상 1개
  s.buff = Object.assign({}, d.buff, s.buff||{});
  s.skills = Array.isArray(s.skills) && s.skills.length===2 ? s.skills : d.skills;
  s.research = Object.assign({}, d.research, s.research||{});
  s.enemy = Object.assign({}, d.enemy, s.enemy||{});
  s.enemy.opts = Object.assign({}, d.enemy.opts, s.enemy.opts||{});
  s.enemy.skills = Array.isArray(s.enemy.skills) && s.enemy.skills.length===2 ? s.enemy.skills : d.enemy.skills;
  s.cmp = Object.assign({}, d.cmp, s.cmp||{});
  s.forge = Object.assign({}, d.forge, s.forge||{});
  s.forge.research = Object.assign({}, d.forge.research, s.forge.research||{});
  s.forge.clan = Object.assign({}, d.forge.clan, s.forge.clan||{});
  if(!Array.isArray(s.forge.table) || s.forge.table.length !== FORGE_DEFAULT_TABLE.length){
    s.forge.table = d.forge.table;
  }
  s._activeTab = s._activeTab || "combat";
  if(!s.stones || !Array.isArray(s.stones.steps) || s.stones.steps.length!==8){
    s.stones = d.stones;
  } else {
    s.stones.history = Array.isArray(s.stones.history) ? s.stones.history : [];
    s.stones.current = s.stones.current || { step:0, choices:[] };
    s.stones.current.choices = Array.isArray(s.stones.current.choices) ? s.stones.current.choices : [];
  }
  return s;
}
function saveState(){ localStorage.setItem(LS_KEY, JSON.stringify(state)); }

/* ==========================================================================
   계산 로직
   ========================================================================== */

// 모든 슬롯 옵션을 종류별 합산
function aggregateOptions(st){
  const agg = Object.fromEntries(OPT.filter(o=>o.id!=="none").map(o=>[o.id,0]));
  const allSlots = [...st.equips, ...st.pets, st.mount];
  for(const slot of allSlots){
    for(const o of slot.opts){
      if(o && o.type && o.type !== "none" && agg[o.type] !== undefined){
        agg[o.type] += (+o.val || 0);
      }
    }
  }
  return agg;
}

// 기본 스탯(연구/버프/체력옵션 반영). 결투장 5배 보정은 HP에만 적용.
function computeBase(st, agg){
  const r = st.research;
  const equipHp  = st.equips.reduce((s,x)=>s+(+x.hp||0),0) * (1 + r.equipHp/100);
  const equipAtk = st.equips.reduce((s,x)=>s+(+x.atk||0),0) * (1 + r.equipAtk/100);
  const petHp    = st.pets.reduce((s,x)=>s+(+x.hp||0),0)   * (1 + r.petHp/100);
  const petAtk   = st.pets.reduce((s,x)=>s+(+x.atk||0),0)  * (1 + r.petAtk/100);
  const mntHp    = (+st.mount.hp||0)  * (1 + r.mountHp/100);
  const mntAtk   = (+st.mount.atk||0) * (1 + r.mountAtk/100);

  const rawHp  = equipHp + petHp + mntHp;
  const rawAtk = equipAtk + petAtk + mntAtk;

  const totalHp_noArena = rawHp * (1 + agg.hp/100) + (+st.buff.hpFlat||0);
  const totalHp = totalHp_noArena * 5; // 결투장
  const totalAtk = rawAtk + (+st.buff.atkFlat||0);

  return { totalHp, totalAtk, rawHp, rawAtk };
}

// 공속 → 일반공격 주기(초)
function attackPeriod(atkSpd){
  const v = Math.max(0, +atkSpd||0);
  const t = [
    [7.1,1.7],[15.4,1.6],[25,1.5],[36.4,1.4],[50,1.3],[66.7,1.2],
    [87.5,1.1],[114,1.0],[150,0.9],[200,0.8],[275,0.7],[400,0.6],
  ];
  for(const [th,sec] of t){ if(v < th) return sec; }
  return 0.5;
}

// 평균 1회 공격 피해 (기댓값)
function avgAutoDmg(atk, opts, enemyBlock){
  const cr = Math.max(0, Math.min(100, opts.critRate))/100;
  const cd = (120 + opts.critDmg)/100; // 기본 치피 120% + 옵션
  const critMult = (1-cr)*1 + cr*cd;
  const doubleMult = 1 + Math.max(0, Math.min(100, opts.double))/100;
  const blockMult = 1 - Math.max(0, Math.min(100, enemyBlock))/100;
  const base = atk * (1 + opts.dmg/100) * (1 + opts.ranged/100);
  return base * critMult * doubleMult * blockMult;
}

// 평균 1회 스킬 피해 (기댓값)  — 흡혈 없음, 원거리% 미적용
function avgSkillDmg(atk, opts, skillCoefPct, enemyBlock, researchSkillDmg){
  const cr = Math.max(0, Math.min(100, opts.critRate))/100;
  const cd = (120 + opts.critDmg)/100;
  const critMult = (1-cr)*1 + cr*cd;
  const doubleMult = 1 + Math.max(0, Math.min(100, opts.double))/100;
  const blockMult = 1 - Math.max(0, Math.min(100, enemyBlock))/100;
  const base = atk * (1 + opts.dmg/100) * (1 + (opts.skillDmg + researchSkillDmg)/100) * (skillCoefPct/100);
  return base * critMult * doubleMult * blockMult;
}

// 스킬 실쿨타임
function realCd(baseCd, skillCdSum){
  const v = +baseCd || 0;
  if(v <= 0) return Infinity; // 쿨 0은 미사용 취급
  return Math.max(0.05, v * (1 + skillCdSum/100));
}

// 시뮬레이션(기댓값 기반, 정수 ms 단위). 양측 대칭 처리.
function sideState(side, oppBlock){
  const autoPSec = attackPeriod(side.opts.atkSpd);
  const autoPMs = Math.round(autoPSec * 1000);
  const auto = avgAutoDmg(side.totalAtk, side.opts, oppBlock);
  const life = Math.max(0, +side.opts.lifesteal||0)/100;
  const skillCdSec = [
    realCd(side.skills[0]?.cd, side.opts.skillCd),
    realCd(side.skills[1]?.cd, side.opts.skillCd),
  ];
  const skillCdMs = skillCdSec.map(v => v===Infinity ? Infinity : Math.max(50, Math.round(v*1000)));
  const skillDmg = [
    (side.skills[0]?.coef>0) ? avgSkillDmg(side.totalAtk, side.opts, side.skills[0].coef, oppBlock, side.research?.skillDmg||0) : 0,
    (side.skills[1]?.coef>0) ? avgSkillDmg(side.totalAtk, side.opts, side.skills[1].coef, oppBlock, side.research?.skillDmg||0) : 0,
  ];
  return {
    autoPMs, auto, life, skillCdMs, skillDmg,
    nextAutoMs: autoPMs>0 ? autoPMs : Infinity,
    nextSkillMs: [skillCdMs[0], skillCdMs[1]],
  };
}

function simulate(me, en){
  const dtMs = 100;
  const tMaxMs = 120000;
  let myHp = me.totalHp, enHp = en.totalHp;
  const myMax = myHp, enMax = enHp;
  const M = sideState(me, en.opts.block);
  const E = sideState(en, me.opts.block);

  let tMs = 0;
  while(tMs < tMaxMs){
    tMs += dtMs;
    let myDealt = 0, enDealt = 0;
    let myAutoDealt = 0;
    if(tMs >= M.nextAutoMs){ myAutoDealt += M.auto; myDealt += M.auto; M.nextAutoMs += M.autoPMs; }
    for(let i=0;i<2;i++) if(M.skillDmg[i]>0 && tMs >= M.nextSkillMs[i]){ myDealt += M.skillDmg[i]; M.nextSkillMs[i] += M.skillCdMs[i]; }
    let enAutoDealt = 0;
    if(tMs >= E.nextAutoMs){ enAutoDealt += E.auto; enDealt += E.auto; E.nextAutoMs += E.autoPMs; }
    for(let i=0;i<2;i++) if(E.skillDmg[i]>0 && tMs >= E.nextSkillMs[i]){ enDealt += E.skillDmg[i]; E.nextSkillMs[i] += E.skillCdMs[i]; }

    enHp -= myDealt;
    myHp -= enDealt;
    if(myAutoDealt > 0) myHp = Math.min(myMax, myHp + myAutoDealt * M.life);
    if(enAutoDealt > 0) enHp = Math.min(enMax, enHp + enAutoDealt * E.life);

    const meDead = myHp <= 0, enDead = enHp <= 0;
    if(meDead && enDead) return { winner:"draw", myHp:0, enHp:0, t:tMs/1000, myMax, enMax };
    if(enDead) return { winner:"me", myHp:Math.max(0,myHp), enHp:0, t:tMs/1000, myMax, enMax };
    if(meDead) return { winner:"en", myHp:0, enHp:Math.max(0,enHp), t:tMs/1000, myMax, enMax };
  }
  const myFrac = myHp/myMax, enFrac = enHp/enMax;
  return { winner: myFrac>enFrac?"me":(myFrac<enFrac?"en":"draw"), myHp:Math.max(0,myHp), enHp:Math.max(0,enHp), t:tMaxMs/1000, myMax, enMax, timeout:true };
}

// 내 관점 파생치(전체)
function buildMe(st){
  const agg = aggregateOptions(st);
  const base = computeBase(st, agg);
  return {
    totalHp: base.totalHp, totalAtk: base.totalAtk,
    opts: agg, skills: st.skills, research: st.research,
    _rawHp: base.rawHp, _rawAtk: base.rawAtk,
  };
}
function buildEnemy(st){
  return {
    totalHp: (+st.enemy.hp||0) * 5,
    totalAtk: +st.enemy.atk||0,
    opts: Object.fromEntries(OPT_IDS_ENEMY.map(k => [k, +st.enemy.opts[k]||0])),
    skills: [
      { coef:+st.enemy.skills?.[0]?.coef||0, cd:+st.enemy.skills?.[0]?.cd||0 },
      { coef:+st.enemy.skills?.[1]?.coef||0, cd:+st.enemy.skills?.[1]?.cd||0 },
    ],
    research: { skillDmg:0 },
  };
}

// 전투력 점수: 승/패 이분 + 체력 비율을 섞어 연속값으로
function powerScore(sim){
  // 승리 시 큰 보상 + 남은 체력 비율
  const myFrac = sim.myHp / Math.max(1, sim.myMax);
  const enFrac = sim.enHp / Math.max(1, sim.enMax);
  if(sim.winner === "me")  return 10000 + myFrac*5000 - sim.t*10;
  if(sim.winner === "en")  return (1 - enFrac) * 3000;         // 적을 얼마나 깎았나
  return 5000 + (myFrac - enFrac) * 2500;                      // 무승부/타임아웃
}

// 최상 빌드 점수: 내 슬롯 옵션을 전부 지우고, 13종 중 단일 종을 (23~24)슬롯 전부에 최대치로 채워 시뮬 돌렸을 때 점수 최대.
// 슬롯 기본(체력/공격력)과 버프/연구/스킬은 그대로 둔다.
// 이론상 총 슬롯 수: 장비 8×2 + 펫 3×2 + 탈것 1×2 = 24
const TOTAL_OPTION_SLOTS = 24;
function totalOptionSlots(){ return TOTAL_OPTION_SLOTS; }

// dist = {옵션id: 배정된 슬롯수}로부터 opts 합산값 계산
function aggregateFromDist(dist){
  const agg = Object.fromEntries(OPT.filter(o=>o.id!=="none").map(o=>[o.id,0]));
  for(const [id, count] of Object.entries(dist)){
    const opt = OPT.find(o => o.id === id);
    if(opt && opt.used) agg[id] = count * opt.max;
  }
  return agg;
}

// dist 기반 "내 쪽" 가상 빌드 생성 (기본 스탯/버프/연구/스킬은 실제 state 따르고, 옵션만 dist로 치환)
function buildMeFromDist(st, dist){
  const agg = aggregateFromDist(dist);
  const base = computeBase(st, agg);
  return { totalHp:base.totalHp, totalAtk:base.totalAtk, opts:agg, skills:st.skills, research:st.research };
}
function scoreForDist(st, dist, enemy){
  return powerScore(simulate(buildMeFromDist(st, dist), enemy));
}

// 탐색 전용 스냅샷: rawHp/rawAtk 미리 계산, buff/skills/research/enemy 얕은 복사
function makeSearchSnapshot(st){
  const r = st.research;
  const equipHp  = st.equips.reduce((s,x)=>s+(+x.hp||0),0)  * (1 + r.equipHp/100);
  const equipAtk = st.equips.reduce((s,x)=>s+(+x.atk||0),0) * (1 + r.equipAtk/100);
  const petHp    = st.pets.reduce((s,x)=>s+(+x.hp||0),0)    * (1 + r.petHp/100);
  const petAtk   = st.pets.reduce((s,x)=>s+(+x.atk||0),0)   * (1 + r.petAtk/100);
  const mntHp    = (+st.mount.hp||0)  * (1 + r.mountHp/100);
  const mntAtk   = (+st.mount.atk||0) * (1 + r.mountAtk/100);
  return {
    rawHp: equipHp + petHp + mntHp,
    rawAtk: equipAtk + petAtk + mntAtk,
    buffHpFlat: +st.buff.hpFlat||0,
    buffAtkFlat: +st.buff.atkFlat||0,
    skills: st.skills.map(s => ({ coef:+s.coef||0, cd:+s.cd||0 })),
    researchSkillDmg: +st.research.skillDmg||0,
    enemy: buildEnemy(st),
  };
}
function buildMeFromSnap(snap, dist){
  const agg = aggregateFromDist(dist);
  const totalHp = (snap.rawHp * (1 + agg.hp/100) + snap.buffHpFlat) * 5;
  const totalAtk = snap.rawAtk + snap.buffAtkFlat;
  return {
    totalHp, totalAtk, opts:agg,
    skills: snap.skills,
    research: { skillDmg: snap.researchSkillDmg },
  };
}
function scoreForDistSnap(snap, dist){
  return powerScore(simulate(buildMeFromSnap(snap, dist), snap.enemy));
}

// 24개 슬롯에 13종 옵션을 혼합해 최적 조합 탐색 (그리디 + 로컬 스왑) — 비동기, 30ms 이상 경과 시 yield
function yieldIfNeeded(yieldState){
  const now = Date.now();
  if(now - yieldState.last > 30){
    yieldState.last = now;
    return new Promise(r => setTimeout(r, 0));
  }
  return null;
}
async function findOptimalBuild(st, onProgress){
  // 탐색 시작 시점의 state를 스냅샷 — 이후 사용자 입력 변경이 결과에 영향 미치지 않음
  const snap = makeSearchSnapshot(st);
  const slots = TOTAL_OPTION_SLOTS;
  const cands = OPT.filter(o => o.used && o.id !== "none");
  const dist = Object.fromEntries(cands.map(o => [o.id, 0]));
  const ys = { last: Date.now() };

  // 1) 그리디
  let curScore = scoreForDistSnap(snap, dist);
  for(let i=0; i<slots; i++){
    let bestId = null, bestScore = -Infinity;
    for(const c of cands){
      dist[c.id]++;
      const s = scoreForDistSnap(snap, dist);
      if(s > bestScore){ bestScore = s; bestId = c.id; }
      dist[c.id]--;
    }
    dist[bestId]++;
    curScore = bestScore;
    const p = yieldIfNeeded(ys);
    if(p){
      if(onProgress) onProgress(`그리디 ${i+1}/${slots}`);
      await p;
    }
  }

  // 2) 로컬 스왑 개선
  let iter = 0;
  while(iter++ < 50){
    let improved = false;
    for(const from of cands){
      if(dist[from.id] === 0) continue;
      for(const to of cands){
        if(from.id === to.id) continue;
        dist[from.id]--; dist[to.id]++;
        const ns = scoreForDistSnap(snap, dist);
        if(ns > curScore + 1e-6){ curScore = ns; improved = true; }
        else { dist[from.id]++; dist[to.id]--; }
      }
      const p = yieldIfNeeded(ys);
      if(p){
        if(onProgress) onProgress(`스왑 R${iter} — ${from.name}`);
        await p;
      }
    }
    if(!improved) break;
  }
  return { dist, score:curScore, slots };
}

// 캐시 기반 최상 점수. 캐시 없으면 단일 옵션 도배의 최대값을 임시 기준으로.
function bestBuildScore(st){
  if(st._bestCache && typeof st._bestCache.score === "number") return st._bestCache.score;
  // fallback: 단일 옵션 도배 최대 (빠른 근사)
  const enemy = buildEnemy(st);
  let best = -Infinity;
  const cands = OPT.filter(o => o.used && o.id !== "none");
  for(const c of cands){
    const dist = Object.fromEntries(cands.map(o => [o.id, o.id===c.id ? TOTAL_OPTION_SLOTS : 0]));
    const s = scoreForDist(st, dist, enemy);
    if(s > best) best = s;
  }
  return best;
}

// 현재 점수
function currentScore(st){
  return powerScore(simulate(buildMe(st), buildEnemy(st)));
}

// 추천: 각 슬롯을 "13종 최대치로 바꿨을 때 달성 가능한 최대 점수"로 평가한 뒤,
// 최대 상승폭이 가장 큰 슬롯을 "교체 가치가 가장 큰 슬롯"으로 선택.
function findBestSwapSlot(st, curScore){
  let bestGain = -Infinity, target = null;
  const iter = [
    ...st.equips.map((s,i)=>({kind:"equips",idx:i})),
    ...st.pets.map((s,i)=>({kind:"pets",idx:i})),
    { kind:"mount", idx:0 },
  ];
  for(const loc of iter){
    const slot = loc.kind==="mount" ? st.mount : st[loc.kind][loc.idx];
    for(let k=0; k<slot.opts.length; k++){
      const opt = slot.opts[k];
      const saveType = opt.type, saveVal = opt.val;
      let slotBest = -Infinity;
      try {
        for(const cand of OPT.filter(o=>o.used && o.id!=="none")){
          if(cand.id === saveType && cand.max === saveVal) continue;
          opt.type = cand.id; opt.val = cand.max;
          const s = powerScore(simulate(buildMe(st), buildEnemy(st)));
          if(s > slotBest) slotBest = s;
        }
      } finally {
        opt.type = saveType; opt.val = saveVal; // 예외가 나도 원복 보장
      }
      const gain = slotBest - curScore;
      if(gain > bestGain){
        bestGain = gain;
        target = { kind:loc.kind, idx:loc.idx, optIdx:k, current:{type:saveType,val:saveVal}, slotBest };
      }
    }
  }
  return target;
}

function recommendForSlot(st, loc, baseScore){
  const out = [];
  const cur = loc.current;
  const slot = loc.kind==="mount" ? st.mount : st[loc.kind][loc.idx];
  const opt = slot.opts[loc.optIdx];
  const saveType = opt.type, saveVal = opt.val;
  try {
    for(const cand of OPT.filter(o=>o.used && o.id!=="none")){
      if(cand.id === cur.type && cand.max === cur.val) continue;
      opt.type = cand.id; opt.val = cand.max;
      const s = powerScore(simulate(buildMe(st), buildEnemy(st)));
      out.push({ id:cand.id, name:cand.name, val:cand.max, score:s, gain:s-baseScore });
    }
  } finally {
    opt.type = saveType; opt.val = saveVal;
  }
  out.sort((a,b)=>b.gain-a.gain);
  return out;
}

/* ==========================================================================
   렌더링 (UI)
   ========================================================================== */

function h(tag, attrs, ...kids){
  const el = document.createElement(tag);
  if(attrs) for(const [k,v] of Object.entries(attrs)){
    if(k==="class") el.className = v;
    else if(k==="html") el.innerHTML = v;
    else if(k.startsWith("on")) el.addEventListener(k.slice(2), v);
    else if(v===true) el.setAttribute(k,"");
    else if(v!==false && v!=null) el.setAttribute(k, v);
  }
  for(const k of kids){
    if(k==null) continue;
    el.append(k.nodeType ? k : document.createTextNode(k));
  }
  return el;
}

function numInput(value, onchange, opts={}){
  return h("input", {
    type:"number", inputmode:"decimal", step:"any",
    value: (value==null||isNaN(value))?"":value,
    placeholder: opts.placeholder||"0",
    onchange:(e)=>{ const v = parseFloat(e.target.value); onchange(isNaN(v)?0:v); }
  });
}
function select(options, value, onchange){
  const sel = h("select", { onchange:(e)=>onchange(e.target.value) });
  for(const o of options){
    const opt = h("option", {value:o.id}, o.name);
    if(o.id === value) opt.selected = true;
    sel.append(opt);
  }
  return sel;
}

function renderOptRow(opt, onTypeChange, onValChange){
  const typeSel = select(OPT, opt.type||"none", onTypeChange);
  const valInp = numInput(opt.val, onValChange);
  const def = OPT.find(o=>o.id===(opt.type||"none"));
  if(def && def.id!=="none"){
    // 최대치 초과 확인(음수 max 포함, skillCd는 -7 이하면 초과)
    const over = def.max < 0 ? (opt.val < def.max) : (opt.val > def.max);
    if(over) valInp.classList.add("over");
  }
  const maxHint = (def && def.id!=="none") ? h("div",{class:"lbl-sub"}, `max ${def.max}%`) : h("div",{class:"lbl-sub"}, "");
  return h("div",{class:"row3"},
    h("div", null, h("label", null, "옵션 종류"), typeSel),
    h("div", null, h("label", null, "수치(%)"), valInp),
    maxHint
  );
}

  hp:"체력", lifesteal:"흡혈", double:"더블", dmg:"피해",
  melee:"근접", ranged:"원거리", atkSpd:"공속", skillDmg:"스킬", skillCd:"쿨감"
};

function gearCard(slot, label, key, active){
  const chips = slot.opts.map(o => {
    if(!o || o.type==="none") return h("span",{class:"opt-chip empty"}, "—");
    const sh = OPT_SHORT[o.type] || o.type;
    return h("span",{class:"opt-chip"}, `${sh} ${o.val}`);
  });
  const hasOpts = slot.opts.some(o => o && o.type!=="none");
  const baseTxt = (slot.hp||slot.atk) ? `H ${Math.round(slot.hp||0).toLocaleString()} · A ${Math.round(slot.atk||0).toLocaleString()}` : "";
  return h("div", {
    class: "gear-card" + (active?" active":"") + (hasOpts?" has-opts":""),
    onclick: ()=>{ state._selectedSlot = key; saveState(); renderMe(); }
  },
    h("div",{class:"icon"}, label.icon),
    h("div",{class:"title"}, label.name),
    h("div",{class:"opts"}, ...chips),
    baseTxt ? h("div",{class:"basestat"}, baseTxt) : null
  );
}

function renderGearEditor(key){
  const [kind, idxStr] = key.split("-");
  const idx = +idxStr;
  const slot = kind==="mount" ? state.mount : state[kind][idx];
  if(!slot) return h("div");
  const label = kind==="equips" ? EQUIP_LABELS[idx] : (kind==="pets" ? PET_LABELS[idx] : MOUNT_LABEL);
  const body = h("div",{class:"slot"},
    h("h4", null, `${label.icon} ${label.name} — 편집`),
    h("div",{class:"row"},
      h("div", null, h("label",null,"기본 체력"), numInput(slot.hp, v=>{ slot.hp=v; onAnyChange(); renderMe(); })),
      h("div", null, h("label",null,"기본 공격력"), numInput(slot.atk, v=>{ slot.atk=v; onAnyChange(); renderMe(); })),
    ),
  );
  for(let i=0;i<slot.opts.length;i++){
    if(!slot.opts[i]) slot.opts[i] = emptyOpt();
    const opt = slot.opts[i];
    body.append(h("div",{class:"lbl-sub", style:"text-align:left;margin:8px 0 2px"}, `옵션 ${i+1}`));
    body.append(renderOptRow(opt,
      t => { opt.type = t; onAnyChange(); renderMe(); },
      v => { opt.val = v; onAnyChange(); renderMe(); }
    ));
  }
  return body;
}

function renderBuff(){

function renderResult(){
  const host = document.getElementById("result-body");
  host.innerHTML = "";

  const me = buildMe(state);
  const en = buildEnemy(state);
  const sim = simulate(me, en);
  const cur = powerScore(sim);
  const best = bestBuildScore(state);
  const relPct = best<=0 ? 0 : (cur/best - 1) * 100;

  const winnerTxt = sim.winner==="me" ? "승리 ✔" : (sim.winner==="en" ? "패배 ✘" : "무승부");
  const atkP = attackPeriod(me.opts.atkSpd);
  const enAtkP = attackPeriod(en.opts.atkSpd);
  function dps(side, oppBlock, autoP){
    let v = avgAutoDmg(side.totalAtk, side.opts, oppBlock)/autoP;
    for(let i=0;i<2;i++){
      const sk = side.skills?.[i];
      if(sk && sk.coef>0 && sk.cd>0){
        v += avgSkillDmg(side.totalAtk, side.opts, sk.coef, oppBlock, side.research?.skillDmg||0) / realCd(sk.cd, side.opts.skillCd);
      }
    }
    return v;
  }
  const myDPS = dps(me, en.opts.block, atkP);
  const enDPS = dps(en, me.opts.block, enAtkP);

  const bigClass = relPct>=0 ? "good" : "bad";
  host.append(
    h("div",{class:"big "+bigClass}, `${relPct>=0?"+":""}${relPct.toFixed(2)}%`),
    h("div",{class:"lbl-sub"}, `최상 빌드 대비 내 전투력`),
    h("div",{class:"slot"},
      h("h4",null,"1:1 시뮬레이션"),

      kv("소요 시간", `${sim.t.toFixed(1)} 초${sim.timeout?" (타임아웃)":""}`),

      kv("적 남은 체력", `${Math.round(sim.enHp).toLocaleString()} / ${Math.round(sim.enMax).toLocaleString()}`),
    ),

      h("h4",null,"파생치"),
      kv("내 총 체력(결투장 ×5)", Math.round(me.totalHp).toLocaleString()),
      kv("내 총 공격력", Math.round(me.totalAtk).toLocaleString()),

let _optimBusy = false;
async function recomputeBest(btn){
  if(_optimBusy) return;
  _optimBusy = true;
  btn.disabled = true;
  const origText = btn.textContent;
  btn.textContent = "탐색 중…";
  try {
    const r = await findOptimalBuild(state, (msg)=>{ btn.textContent = "탐색: " + msg; });
    state._bestCache = { dist:r.dist, score:r.score, ts:Date.now() };
    saveState();
    render();
  } catch(e){
    alert("계산 실패: "+e.message);
    btn.textContent = origText;
    btn.disabled = false;
  } finally {
    _optimBusy = false;
  }
}

  const targetSlot = loc.kind==="mount" ? state.mount : state[loc.kind][loc.idx];

  host.append(h("div",{class:"slot"},

      gain>0?"✔ 더 강해집니다":(gain<0?"✘ 더 약해집니다":"변화 없음")
    )
  ));
}

function forgeIncomePerSec(f){
  const rateBonus = 1 + (f.research.rate||0)/100; // 단계당 1%
  const moneyPerSec  = INCOME_MONEY_PER_SEC  * rateBonus;
  const hammerPerSec = (INCOME_HAMMER_PER_MIN/60) * rateBonus;
  const moneyEquivPerSec = moneyPerSec + hammerPerSec * HAMMER_TO_MONEY;
  return { moneyPerSec, hammerPerSec, moneyEquivPerSec };
}
function forgeUpgradeInfo(f){
  const i = Math.max(0, Math.min(FORGE_DEFAULT_TABLE.length-1, (f.level||1)-1));
  const row = f.table[i] || FORGE_DEFAULT_TABLE[i];
  const costDisc = 1 - (f.research.cost||0)/100;      // 단계당 1%
  const timeDisc = 1 - ((f.research.time||0)*2)/100;  // 단계당 2%
  return {
    level: f.level,
    rawCost: row.cost, rawTime: row.time,
    effCost: Math.max(0, Math.round(row.cost * costDisc)),
    effTime: Math.max(0, Math.round(row.time * timeDisc)),
  };
}
function calcClanReward(clan){
  let hammer = 0;
  for(const m of FORGE_PERSONAL_MILESTONES){
    if((+clan.personalScore||0) >= m.score) hammer += m.hammer;
  }
  const tier = FORGE_TIER_REWARDS[clan.tier] || FORGE_TIER_REWARDS.B;
  hammer += clan.win ? tier.win : tier.lose;
  return { hammer, moneyEquiv: hammer * HAMMER_TO_MONEY };
}
function nextMondayAt8(fromDate){
  const d = new Date(fromDate);
  for(let i=0; i<=7; i++){
    const t = new Date(d);
    t.setDate(d.getDate()+i);
    t.setHours(8,0,0,0);
    if(t > d && t.getDay() === 1) return t;
  }
  return null;
}
function formatDuration(sec){
  sec = Math.max(0, Math.round(sec));
  const d = Math.floor(sec/86400); sec -= d*86400;
  const h = Math.floor(sec/3600);  sec -= h*3600;
  const m = Math.floor(sec/60);    sec -= m*60;
  const parts = [];
  if(d) parts.push(d+"일");
  if(h || d) parts.push(h+"시간");
  if(m || h || d) parts.push(m+"분");
  parts.push(sec+"초");
  return parts.join(" ");
}
function formatKRW(n){
  n = Math.round(n);
  return n.toLocaleString()+"원";
}
function formatDateTime(d){
  const pad = x => String(x).padStart(2,"0");
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// 다음 업그레이드까지 걸리는 시간 계산 (월요일 클랜 보상 고려)
function forgeTimeToUpgrade(state){
  const f = state.forge;
  const up = forgeUpgradeInfo(f);
  const inc = forgeIncomePerSec(f);
  const now = new Date();
  const asset = (+f.money||0) + (+f.hammers||0) * HAMMER_TO_MONEY;
  const need = up.effCost;

  const monday = nextMondayAt8(now);
  const untilMondaySec = monday ? (monday - now)/1000 : Infinity;
  const clanReward = (!f.clan.claimed) ? calcClanReward(f.clan).moneyEquiv : 0;

  let costTimeSec;
  let usedClan = false;
  // 시나리오 A: 월요일 전에 자산만으로 충족
  if(asset >= need){
    costTimeSec = 0;
  } else {
    const timeByIncomeOnly = (need - asset) / Math.max(1e-9, inc.moneyEquivPerSec);
    if(timeByIncomeOnly <= untilMondaySec){
      costTimeSec = timeByIncomeOnly;
    } else {
      // 월요일 보상 포함
      const assetAtMonday = asset + inc.moneyEquivPerSec * untilMondaySec + clanReward;
      if(assetAtMonday >= need){
        costTimeSec = untilMondaySec;
        usedClan = true;
      } else {
        costTimeSec = untilMondaySec + (need - assetAtMonday) / Math.max(1e-9, inc.moneyEquivPerSec);
        usedClan = true;
      }
    }
  }
  const totalSec = costTimeSec + up.effTime;
  const doneAt = new Date(now.getTime() + totalSec*1000);
  return {
    now, monday, untilMondaySec,
    asset, need, upgradeInfo: up, income: inc,
    clanReward, usedClan,
    costTimeSec, upgradeSec: up.effTime, totalSec, doneAt,
  };
}

// Laplace 스무딩 적용한 "위가 정답일 확률"
function stoneProbUp(step){
  const up = step.upPass + step.downFail;   // 위가 정답이었던 관측
  const dn = step.downPass + step.upFail;   // 아래가 정답이었던 관측
  const n = up + dn;
  return (up + 1) / (n + 2);
}
function stoneTotalObs(step){
  return step.upPass + step.upFail + step.downPass + step.downFail;
}
// 기록: 이번 시도에서 step에 choice(up/down)로 통과/실패
function recordStone(stepIdx, choice, passed){
  const s = state.stones.steps[stepIdx];
  if(choice==="up")   passed ? s.upPass++   : s.upFail++;
  else                passed ? s.downPass++ : s.downFail++;
}
function stonesPickChoice(stepIdx, choice){
  const cur = state.stones.current;
  cur.choices[stepIdx] = choice;
  cur.step = stepIdx; // 아직 결과 미확정 상태로 대기
  onAnyChange();
}
function stonesResolve(passed){
  const cur = state.stones.current;
  const idx = cur.step;
  const choice = cur.choices[idx];
  if(!choice){ alert("먼저 위/아래를 선택하세요."); return; }
  recordStone(idx, choice, passed);
  if(passed){
    if(idx === 7){
      // 8단계 전부 통과
      state.stones.history.unshift({ choices: cur.choices.slice(), failedAt: null, success: true, ts: Date.now() });
      state.stones.current = { step:0, choices:[] };
      alert("🎉 8단계 통과 성공!");
    } else {
      cur.step = idx + 1;
    }
  } else {
    state.stones.history.unshift({ choices: cur.choices.slice(0, idx+1), failedAt: idx, success:false, ts: Date.now() });
    state.stones.current = { step:0, choices:[] };
  }
  saveState();
  render();
}
function stonesReset(){
  if(!confirm("진행 중인 시도를 버리고 처음으로 돌아갑니다. 계속?")) return;
  state.stones.current = { step:0, choices:[] };
  saveState();
  render();
}
function stonesResetAll(){
  if(!confirm("모든 통계와 기록을 초기화합니다. 계속?")) return;
  state.stones = defaultState().stones;
  saveState();
  render();
}

function renderStonesPlay(){
  const host = document.getElementById("stones-play-body");
  host.innerHTML = "";
  const cur = state.stones.current;
  const step = cur.step;
  const isWaitingResult = !!cur.choices[step]; // 선택은 했는데 성공/실패 아직 입력 안 함

  host.append(
    h("div",{class:"big"}, `${step+1} / 8 단계`),
    h("div",{class:"lbl-sub"}, isWaitingResult ? `선택: ${cur.choices[step]==="up"?"▲ 위":"▼ 아래"} — 결과 입력 대기` : "위/아래를 골라 진행")
  );

  // 확률 / 추천
  const s = state.stones.steps[step];
  const pUp = stoneProbUp(s);
  const n = stoneTotalObs(s);
  const rec = pUp === 0.5 ? "동률" : (pUp > 0.5 ? "▲ 위 추천" : "▼ 아래 추천");
  host.append(h("div",{class:"slot"},
    h("h4",null,`${step+1}단계 확률 (관측 ${n}회)`),
    kv("▲ 위가 정답일 확률", `${(pUp*100).toFixed(1)}%`),
    kv("▼ 아래가 정답일 확률", `${((1-pUp)*100).toFixed(1)}%`),
    kv("추천", rec),
  ));

  // 선택 버튼
  const upBtn = h("button",{class:"btn"+(cur.choices[step]==="up"?"":" alt"),
    style:"flex:1;padding:16px",
    onclick:()=>stonesPickChoice(step, "up")
  }, `▲ 위 (${(pUp*100).toFixed(0)}%)`);
  const dnBtn = h("button",{class:"btn"+(cur.choices[step]==="down"?"":" alt"),
    style:"flex:1;padding:16px",
    onclick:()=>stonesPickChoice(step, "down")
  }, `▼ 아래 (${((1-pUp)*100).toFixed(0)}%)`);
  host.append(h("div",{class:"btnrow",style:"margin-top:10px"}, upBtn, dnBtn));

  // 결과 버튼
  const passBtn = h("button",{class:"btn", style:"flex:1;padding:14px", onclick:()=>stonesResolve(true)}, "✔ 통과");
  const failBtn = h("button",{class:"btn warn", style:"flex:1;padding:14px", onclick:()=>stonesResolve(false)}, "✘ 실패 (처음으로)");
  host.append(h("div",{class:"btnrow",style:"margin-top:6px"}, passBtn, failBtn));

  // 현재 시도에서 지금까지 선택한 경로
  if(cur.choices.length > 0){
    const path = cur.choices.map((c,i)=> `${i+1}:${c==="up"?"▲":"▼"}`).join("  ");
    host.append(h("div",{class:"muted",style:"margin-top:10px"}, `이번 시도: ${path}`));
  }

  host.append(h("div",{class:"btnrow",style:"margin-top:8px"},
    h("button",{class:"btn alt", onclick:stonesReset}, "진행중 시도 초기화")
  ));
}

function setActiveTab(name){
  document.querySelectorAll(".tab").forEach(t => t.classList.toggle("active", t.dataset.tab===name));
  document.querySelectorAll(".tab-panel").forEach(p => p.classList.toggle("active", p.id==="panel-"+name));
  state._activeTab = name;
  saveState();
}
document.querySelectorAll(".tab").forEach(t => t.addEventListener("click", ()=> setActiveTab(t.dataset.tab)));
setActiveTab(state._activeTab || "combat");

render();
</script>
</body>
</html>
